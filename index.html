
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>修仙大世界 · 放置文字修仙RPG</title>
<style>
/* ========== RESET & BASE ========== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  background:#E8E8E8;
  display:flex;justify-content:center;align-items:center;
  min-height:100vh;font-family:system-ui,-apple-system,sans-serif;
  user-select:none;
}

/* ========== GAME CONTAINER ========== */
.game-container{
  width:2000px;height:900px;background:#F5F5F5;
  border-radius:4px;overflow:hidden;
  display:flex;flex-direction:column;
  box-shadow:0 4px 24px rgba(0,0,0,0.15);
}

/* ========== TOP BAR ========== */
.top-bar{
  height:60px;background:#FFFFFF;
  display:flex;align-items:center;padding:0 28px;
  gap:20px;border-bottom:1px solid #EBEBEB;
  flex-shrink:0;
}
.top-bar .realm-badge{
  background:linear-gradient(135deg,#C9A96E,#B8944A);
  color:#FFF;font-weight:700;font-size:16px;
  padding:6px 16px;border-radius:20px;
  white-space:nowrap;
}
.top-bar .qi-bar-wrap{
  flex:1;height:14px;background:#E8E8E8;border-radius:7px;
  overflow:hidden;position:relative;
}
.top-bar .qi-bar-fill{
  height:100%;background:linear-gradient(90deg,#7EC8E3,#4A90D9);
  border-radius:7px;transition:width 0.5s ease;
}
.top-bar .qi-bar-label{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  font-size:11px;color:#333;font-weight:600;pointer-events:none;
}
.top-bar .stat-item{
  display:flex;align-items:center;gap:5px;
  font-size:14px;color:#555;white-space:nowrap;
}
.top-bar .stat-item .val{font-weight:700;color:#333;min-width:40px;text-align:right}
.top-bar .stat-item .rate{font-size:12px;color:#C9A96E}

/* ========== MAIN AREA ========== */
.main-area{
  flex:1;display:flex;gap:12px;padding:12px;
  min-height:0;
}

/* ========== CARD BASE ========== */
.card{
  background:#FFFFFF;border-radius:12px;
  box-shadow:0 2px 8px rgba(0,0,0,0.08);
  padding:16px;overflow:hidden;
  display:flex;flex-direction:column;
}
.card-title{
  font-size:18px;font-weight:700;color:#C9A96E;
  margin-bottom:12px;flex-shrink:0;
}

/* ========== LEFT PANEL (340px) ========== */
.left-panel{
  width:420px;flex-shrink:0;gap:6px;
}
.left-panel .char-name{
  font-size:22px;font-weight:700;color:#333;
  margin-bottom:4px;
}
.left-panel .realm-display{
  font-size:15px;color:#C9A96E;font-weight:600;
  margin-bottom:10px;
}
.left-panel .hp-bar-wrap, .left-panel .exp-bar-wrap{
  margin-bottom:6px;
}
.left-panel .bar-label{
  font-size:13px;color:#666;margin-bottom:3px;
  display:flex;justify-content:space-between;
}
.left-panel .bar-outer{
  height:10px;background:#E8E8E8;border-radius:5px;overflow:hidden;
}
.left-panel .hp-bar-fill{
  height:100%;background:linear-gradient(90deg,#E74C3C,#C0392B);
  border-radius:5px;transition:width 0.4s ease;
}
.left-panel .exp-bar-fill{
  height:100%;background:linear-gradient(90deg,#F39C12,#E67E22);
  border-radius:5px;transition:width 0.4s ease;
}
.left-panel .attr-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:6px;
  margin-top:8px;
}
.left-panel .attr-cell{
  background:#FAFAFA;border-radius:8px;padding:8px 10px;
  font-size:13px;color:#555;
}
.left-panel .attr-cell .attr-val{
  font-weight:700;color:#333;font-size:15px;
}
.left-panel .equip-slots{
  margin-top:8px;display:flex;flex-direction:column;gap:4px;
}
.left-panel .equip-slot{
  background:#FAFAFA;border-radius:8px;padding:6px 10px;
  font-size:13px;color:#AAA;border:1px dashed #DDD;
}
.left-panel .btn-breakthrough{
  margin-top:8px;padding:8px;background:linear-gradient(135deg,#C9A96E,#B8944A);
  color:#FFF;border:none;border-radius:8px;font-size:15px;font-weight:700;
  cursor:pointer;transition:all 0.15s ease;
  display:none;
}
.left-panel .btn-breakthrough:hover{opacity:0.9}
.left-panel .btn-breakthrough:active{transform:scale(0.97)}
.left-panel .btn-breakthrough.show{display:block}

/* ========== CENTER AREA (840px) ========== */
.center-area{
  flex:1;display:flex;flex-direction:column;gap:24px;min-width:0;
}
.center-area .combat-log{
  flex:1;background:#1A1A2E;border-radius:12px;
  padding:14px;overflow-y:auto;min-height:0;
  font-size:17px;line-height:1.7;color:#E0E0E0;
  font-family:'Courier New',monospace;
  box-shadow:inset 0 0 20px rgba(0,0,0,0.3);
}
.center-area .combat-log .log-entry{
  padding:3px 0;border-bottom:1px solid rgba(255,255,255,0.04);
  animation:fadeIn 0.25s ease;
}
.center-area .combat-log .log-crit{color:#FFD700;font-weight:700}
.center-area .combat-log .log-dodge{color:#888}
.center-area .combat-log .log-victory{color:#2ECC71;font-weight:700}
.center-area .combat-log .log-defeat{color:#E74C3C;font-weight:700}
.center-area .combat-log .log-info{color:#7EC8E3}
@keyframes fadeIn{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:translateY(0)}}

.center-area .sprite-area{
  height:180px;display:flex;justify-content:space-evenly;
  align-items:center;background:#FFFFFF;border-radius:12px;
  box-shadow:0 2px 8px rgba(0,0,0,0.08);padding:16px 24px;flex-shrink:0;
}
.sprite-wrap{display:flex;flex-direction:column;align-items:center;gap:4px}
.sprite-wrap .sprite-label{font-size:12px;color:#888;font-weight:600}
.enemy-slot{display:flex}
.enemy-slot.empty{display:none}
.sprite-body{position:relative;width:60px;height:78px}
.sprite-body .head{
  width:38px;height:38px;border-radius:50%;
  position:absolute;top:0;left:50%;transform:translateX(-50%);
  border:2px solid;
}
.sprite-body .torso{
  width:44px;height:40px;border-radius:22px;
  position:absolute;top:28px;left:50%;transform:translateX(-50%);
  border:2px solid;
}
.sprite-body.enemy .head{background:#3A1A1A;border-color:#8B0000}
.sprite-body.enemy .torso{background:#3A1A1A;border-color:#8B0000}
.sprite-body.boss .head{background:#4A0000;border-color:#FFD700}
.sprite-body.boss .torso{background:#4A0000;border-color:#FFD700}
.sprite-body.attacking{animation:attackShake 0.2s ease}
@keyframes attackShake{
  0%,100%{transform:translateX(0)}
  25%{transform:translateX(-6px)}
  75%{transform:translateX(6px)}
}

.center-area .enemy-info-cards{
  display:flex;gap:14px;flex-shrink:0;
}
.enemy-card{
  flex:1;background:#FFFFFF;border-radius:12px;
  box-shadow:0 2px 8px rgba(0,0,0,0.08);padding:14px 16px;
  border:2px solid transparent;transition:border-color 0.3s;
  min-width:0;
}
.enemy-card.active{border-color:#C9A96E;box-shadow:0 2px 12px rgba(201,169,110,0.25)}
.enemy-card .enemy-name-row{
  display:flex;align-items:center;gap:6px;margin-bottom:5px;flex-wrap:wrap;
}
.enemy-card .enemy-name{
  font-size:16px;font-weight:700;color:#8B0000;
}
.enemy-card .enemy-realm-tag{
  font-size:11px;background:#FFF3E0;color:#C9A96E;
  padding:1px 8px;border-radius:8px;font-weight:600;
}
.enemy-card .boss-tag{
  font-size:11px;background:#FFD700;color:#4A0000;
  padding:1px 8px;border-radius:8px;font-weight:700;
}
.enemy-card .enemy-hp-row{margin-bottom:5px}
.enemy-card .enemy-hp-label{font-size:11px;color:#666;display:flex;justify-content:space-between;margin-bottom:2px}
.enemy-card .enemy-hp-outer{height:8px;background:#E8E8E8;border-radius:4px;overflow:hidden}
.enemy-card .enemy-hp-fill{height:100%;background:linear-gradient(90deg,#E74C3C,#8B0000);border-radius:4px;transition:width 0.4s ease}
.enemy-card .enemy-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:3px 7px;
}
.enemy-card .enemy-grid-cell{
  display:flex;justify-content:space-between;align-items:center;
  padding:3px 7px;background:#FAFAFA;border-radius:5px;
  font-size:11px;color:#666;
}
.enemy-card .enemy-grid-cell .gval{font-weight:700;color:#333;font-size:12px}
.enemy-card .enemy-grid-cell .gval.highlight{color:#C9A96E}

/* ========== RIGHT PANEL (340px) ========== */
.right-panel{
  width:420px;flex-shrink:0;gap:0;
}
.right-panel .menu-btns{display:flex;flex-direction:column;gap:8px;margin-bottom:12px;flex-shrink:1;overflow-y:auto;min-height:0}
.right-panel .menu-btn{
  padding:12px 16px;background:#FAFAFA;border:2px solid transparent;
  border-radius:10px;font-size:16px;font-weight:600;color:#666;
  cursor:pointer;transition:all 0.15s ease;text-align:left;flex-shrink:0;
}
.right-panel .menu-btn:hover{background:#F0F0F0;color:#333}
.right-panel .menu-btn:active{transform:scale(0.98)}
.right-panel .menu-btn.active{
  background:#FFF;border-color:#C9A96E;color:#C9A96E;
  box-shadow:0 2px 8px rgba(201,169,110,0.2);
}
.right-panel .panel-content{
  flex:1;display:flex;align-items:center;justify-content:center;
  color:#AAA;font-size:16px;min-height:0;
}

/* ========== BOTTOM BAR ========== */
.bottom-bar{
  height:50px;background:#FFFFFF;
  display:flex;align-items:center;justify-content:center;
  gap:12px;padding:0 28px;border-top:1px solid #EBEBEB;
  flex-shrink:0;
}
.bottom-bar button{
  padding:8px 22px;border:none;border-radius:8px;
  font-size:15px;font-weight:600;cursor:pointer;
  transition:all 0.15s ease;
}
.bottom-bar button:hover{opacity:0.85}
.bottom-bar button:active{transform:scale(0.96)}
.btn-fight{background:#C9A96E;color:#FFF}
.btn-cultivate{background:#7EC8E3;color:#FFF}
.btn-explore{background:#AAA;color:#FFF}
.btn-reset{background:#E74C3C;color:#FFF}
.btn-idle-toggle{
  padding:8px 22px;border:none;border-radius:20px;
  font-size:15px;font-weight:700;cursor:pointer;
  transition:all 0.3s ease;min-width:100px;
}
.btn-idle-toggle.on{background:#2ECC71;color:#FFF}
.btn-idle-toggle.off{background:#AAA;color:#FFF}

/* ========== BREAKTHROUGH TOAST ========== */
.breakthrough-toast{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  background:linear-gradient(135deg,#FFD700,#C9A96E);
  color:#1A1A1A;font-size:28px;font-weight:900;
  padding:24px 48px;border-radius:16px;
  box-shadow:0 8px 40px rgba(201,169,110,0.6);
  z-index:999;pointer-events:none;
  animation:toastPop 2.5s ease forwards;
}
@keyframes toastPop{
  0%{opacity:0;transform:translate(-50%,-50%) scale(0.5)}
  15%{opacity:1;transform:translate(-50%,-50%) scale(1.08)}
  25%{transform:translate(-50%,-50%) scale(1)}
  70%{opacity:1}
  100%{opacity:0;transform:translate(-50%,-50%) scale(0.9)}
}

/* ========== SCROLLBAR ========== */
.combat-log::-webkit-scrollbar{width:6px}
.combat-log::-webkit-scrollbar-track{background:transparent}
.combat-log::-webkit-scrollbar-thumb{background:#444;border-radius:3px}


/* ========== EQUIP PICKER ========== */
.equip-picker-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:100;display:flex;align-items:center;justify-content:center}
.equip-picker-card{background:#FFF;border-radius:12px;padding:20px;max-width:420px;max-height:70vh;overflow-y:auto;box-shadow:0 4px 24px rgba(0,0,0,0.3)}
.equip-picker-title{font-size:18px;font-weight:700;color:#C9A96E;margin-bottom:4px}
.equip-picker-sub{font-size:11px;color:#888;margin-bottom:12px}
.equip-picker-section{margin-bottom:10px}
.equip-picker-section-title{font-size:13px;font-weight:600;color:#555;margin-bottom:4px}
.equip-picker-char{padding:8px 12px;margin:3px 0;border-radius:8px;background:#FAFAFA;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;justify-content:space-between;border-left:4px solid #CCC}
.equip-picker-char:hover{background:#F0F0F0}
.equip-picker-char.full{opacity:0.45;cursor:default}
.equip-picker-char.full:hover{background:#FAFAFA}
.equip-picker-char .char-label{font-size:14px;font-weight:600;color:#333}
.equip-picker-char .char-slots{font-size:10px;color:#888}
.equip-picker-cancel{margin-top:12px;padding:8px 20px;border:none;border-radius:8px;background:#AAA;color:#FFF;cursor:pointer;font-size:14px;width:100%}

/* ========== SKILL PANEL ========== */
.skill-tab{
  padding:4px 10px;border:none;border-radius:6px;
  font-size:12px;font-weight:600;cursor:pointer;
  transition:all 0.15s ease;
}
.skill-tab:hover{opacity:0.85}
.skill-card{transition:all 0.15s ease}
.skill-card:hover{box-shadow:0 2px 8px rgba(0,0,0,0.08)}
.skill-equip-btn{transition:all 0.15s ease}
.skill-equip-btn:hover{opacity:0.85}

/* === V2 多角色系统 === */
/* 左侧面板滚动修复 */
.left-panel{overflow-y:auto!important}

/* 中央面板 */
#combatView{flex:1;display:flex;flex-direction:column;gap:20px;min-height:0}
#centerPanel{flex:1;overflow-y:auto;min-height:0;padding:16px}
#centerPanel .card-title{font-size:20px;font-weight:700;color:#C9A96E;margin-bottom:12px;flex-shrink:0}

/* 技能面板网格 */
.panel-skill-tabs{display:flex;gap:4px;margin-bottom:10px;flex-shrink:0;flex-wrap:wrap}
.panel-skill-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;overflow-y:auto;flex:1}
.panel-skill-item{
  background:#FAFAFA;border-radius:10px;padding:10px;
  border-left:4px solid #CCC;display:flex;flex-direction:column;gap:4px;
  transition:all 0.15s ease;
}
.panel-skill-item:hover{box-shadow:0 2px 8px rgba(0,0,0,0.08)}
.panel-skill-item.equipped{background:#FFFDF5;border-left-color:#C9A96E}
.panel-skill-item .skill-icon-row{display:flex;align-items:center;gap:6px}
.panel-skill-item .skill-icon-row .skill-icon{font-size:20px}
.panel-skill-item .skill-icon-row .skill-name{font-size:13px;font-weight:700;color:#333}
.panel-skill-item .skill-meta{font-size:10px;color:#888;display:flex;gap:8px}
.panel-skill-item .skill-desc{font-size:10px;color:#AAA}
.panel-skill-item .skill-action{margin-top:2px}
.panel-skill-item .skill-action button{
  font-size:10px;padding:2px 8px;border:none;border-radius:5px;
  cursor:pointer;font-weight:600;transition:all 0.15s;
}
.panel-skill-item .skill-action button:hover{opacity:0.85}
.panel-skill-item .skill-quality-tag{font-size:9px;padding:1px 6px;border-radius:4px;font-weight:600}

/* 背包面板网格 */
.panel-bag-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;overflow-y:auto;flex:1}
.panel-bag-tabs{display:flex;gap:4px;margin-bottom:10px;flex-shrink:0;flex-wrap:wrap}
.panel-bag-item{
  background:#FAFAFA;border-radius:10px;padding:10px;
  border:2px solid #EEE;display:flex;flex-direction:column;align-items:center;gap:4px;
  cursor:pointer;transition:all 0.15s ease;
}
.panel-bag-item:hover{border-color:#C9A96E;box-shadow:0 2px 8px rgba(0,0,0,0.08)}
.panel-bag-item .bag-icon{font-size:28px}
.panel-bag-item .bag-name{font-size:12px;font-weight:700;color:#333;text-align:center}
.panel-bag-item .bag-quality{font-size:10px;font-weight:600}
.panel-bag-item .bag-qty{font-size:10px;color:#AAA}

/* 伙伴面板（中央） */
.panel-partner-wrap{display:flex;flex-direction:column;height:100%;overflow-y:auto}
.panel-partner-wrap .team-slots-row{display:flex;gap:10px;margin-bottom:12px;flex-shrink:0}
.panel-partner-wrap .team-slot-big{
  width:80px;height:80px;border-radius:12px;border:2px dashed #DDD;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-size:11px;color:#CCC;text-align:center;flex-shrink:0;
  transition:all 0.15s ease;gap:2px;
}
.panel-partner-wrap .team-slot-big.filled{border-color:#C9A96E;border-style:solid;background:#FFFDF5;font-weight:600;color:#333}
.panel-partner-wrap .team-slot-big.main-slot{border-color:#C9A96E;background:linear-gradient(135deg,#FFFDF5,#FFF);font-weight:700;font-size:13px;color:#C9A96E;border-style:solid}
.panel-partner-wrap .team-slot-big .slot-mini-head{
  width:24px;height:24px;border-radius:50%;border:2px solid;
}
.panel-partner-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;overflow-y:auto;flex:1}
.panel-partner-card{
  background:#FAFAFA;border-radius:10px;padding:10px;
  border-left:4px solid #CCC;display:flex;flex-direction:column;gap:4px;
  transition:all 0.15s ease;
}
.panel-partner-card:hover{box-shadow:0 2px 8px rgba(0,0,0,0.08)}
.panel-partner-card .pp-name{font-size:13px;font-weight:700;color:#333}
.panel-partner-card .pp-stats{font-size:10px;color:#888}
.panel-partner-card .pp-skills{font-size:10px;color:#C9A96E}
.panel-partner-card .pp-actions{margin-top:4px;display:flex;gap:4px}
.panel-partner-card .pp-btn{
  padding:3px 10px;border:none;border-radius:5px;
  font-size:10px;font-weight:600;cursor:pointer;
  transition:all 0.15s;
}
.panel-partner-card .pp-btn:hover{opacity:0.85}
.panel-partner-card .pp-btn.equip{background:#C9A96E;color:#FFF}
.panel-partner-card .pp-btn.unequip{background:#E74C3C;color:#FFF}

/* 商店面板（中央） */
.panel-shop-wrap{display:flex;flex-direction:column;align-items:center;gap:16px;padding:20px}
.panel-shop-wrap .shop-balance-large{font-size:22px;font-weight:700;color:#C9A96E}
.panel-shop-wrap .shop-desc-text{font-size:13px;color:#888}
.panel-shop-btn{
  width:280px;padding:14px 20px;border:none;border-radius:12px;
  font-size:16px;font-weight:700;cursor:pointer;
  transition:all 0.15s ease;text-align:center;
}
.panel-shop-btn:hover{opacity:0.9;transform:translateY(-2px)}
.panel-shop-btn:active{transform:scale(0.97)}
.panel-shop-btn.normal-recruit{background:linear-gradient(135deg,#A0A0A0,#777);color:#FFF}
.panel-shop-btn.premium-recruit{background:linear-gradient(135deg,#C9A96E,#B8944A);color:#FFF}
.panel-shop-info{font-size:11px;color:#999;margin-top:-12px}
.panel-shop-result{text-align:center;padding:16px;background:#FAFAFA;border-radius:10px;font-size:15px;font-weight:700;animation:fadeIn 0.5s ease;width:100%}
.panel-achieve-placeholder{display:flex;align-items:center;justify-content:center;height:100%;font-size:18px;color:#BBB}

/* 角色卡片列表 */
.char-card-list{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:8px;min-height:0}
.char-card-list::-webkit-scrollbar{width:5px}
.char-card-list::-webkit-scrollbar-track{background:transparent}
.char-card-list::-webkit-scrollbar-thumb{background:#DDD;border-radius:3px}

.char-card{
  background:#FFF;border-radius:12px;padding:14px 14px;
  box-shadow:0 1px 4px rgba(0,0,0,0.06);
  display:flex;gap:10px;align-items:center;
  min-height:130px;flex-shrink:0;cursor:pointer;
  transition:all 0.15s ease;border:2px solid transparent;
}
.char-card:hover{box-shadow:0 2px 8px rgba(0,0,0,0.1)}
.char-card.main{border-color:#C9A96E;background:linear-gradient(135deg,#FFFDF5,#FFF)}
.char-card .card-sprite{flex-shrink:0;width:60px;height:78px;position:relative}
.char-card .card-head{
  width:44px;height:44px;border-radius:50%;
  position:absolute;top:0;left:50%;transform:translateX(-50%);
  border:3px solid #C9A96E;
}
.char-card .card-torso{
  width:48px;height:38px;border-radius:20px;
  position:absolute;top:32px;left:50%;transform:translateX(-50%);
  border:2px solid #C9A96E;
}
.char-card .card-info{flex:1;min-width:0;display:flex;flex-direction:column;gap:3px}
.char-card .card-name-row{display:flex;align-items:center;gap:6px}
.char-card .card-name{font-size:15px;font-weight:700;color:#333}
.char-card .card-realm-tag{font-size:10px;background:#FFF3E0;color:#C9A96E;padding:1px 8px;border-radius:6px;font-weight:600}
.char-card .card-bars{display:flex;flex-direction:column;gap:3px}
.char-card .card-hp-bar-wrap{height:12px;background:#F0F0F0;border-radius:6px;overflow:hidden;position:relative}
.char-card .card-hp-bar-fill{height:100%;background:linear-gradient(90deg,#E74C3C,#C0392B);border-radius:6px;transition:width 0.4s}
.char-card .card-qi-bar-wrap{height:12px;background:#F0F0F0;border-radius:6px;overflow:hidden;position:relative}
.char-card .card-qi-bar-fill{height:100%;background:linear-gradient(90deg,#7EC8E3,#4A90D9);border-radius:6px;transition:width 0.4s}
.char-card .bar-label-v2{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:10px;font-weight:700;color:#333;pointer-events:none;white-space:nowrap}
.char-card .card-stats{font-size:11px;color:#888;display:flex;gap:8px;flex-wrap:wrap}
.char-card .card-stats .stat-item-v2{display:flex;align-items:center;gap:3px}
.char-card .card-stats .stat-val{font-weight:700;color:#555}
.char-card .card-skill-name{font-size:10px;color:#C9A96E;font-weight:600}

.char-card.empty{border:2px dashed #DDD;background:#FAFAFA;justify-content:center;cursor:default}
.char-card.empty:hover{box-shadow:0 1px 4px rgba(0,0,0,0.06)}
.char-card.empty .empty-text{text-align:center;color:#BBB;font-size:13px}
.char-card.empty .empty-btn{
  margin-top:6px;padding:4px 12px;background:#C9A96E;color:#FFF;
  border:none;border-radius:6px;font-size:11px;cursor:pointer;
  font-weight:600;transition:all 0.15s;
}
.char-card.empty .empty-btn:hover{opacity:0.85}

/* 伙伴详情展开 */
.char-card .partner-detail{display:none;margin-top:6px}
.char-card.expanded .partner-detail{display:block}
.char-card.expanded{min-height:auto}

/* 商店 */
.shop-container{display:flex;flex-direction:column;gap:12px;height:100%;overflow-y:auto}
.shop-container .shop-balance{font-size:15px;color:#C9A96E;font-weight:700;text-align:center}
.shop-container .shop-desc{font-size:12px;color:#999;text-align:center;margin-top:-8px}
.shop-btn{
  padding:12px 16px;border:none;border-radius:10px;
  font-size:15px;font-weight:700;cursor:pointer;
  transition:all 0.15s ease;width:100%;text-align:center;
}
.shop-btn:hover{opacity:0.9;transform:translateY(-1px)}
.shop-btn:active{transform:scale(0.97)}
.shop-btn.normal{background:linear-gradient(135deg,#A0A0A0,#777);color:#FFF}
.shop-btn.premium{background:linear-gradient(135deg,#C9A96E,#B8944A);color:#FFF}
.shop-btn-info{font-size:10px;color:#888;text-align:center;margin-top:-8px}

.shop-result{
  text-align:center;padding:16px;background:#FAFAFA;border-radius:10px;
  font-size:16px;font-weight:700;animation:fadeIn 0.5s ease;
}

/* 伙伴管理 */
.partner-grid{display:flex;flex-direction:column;gap:10px;height:100%;overflow-y:auto}
.partner-grid .team-slots{display:flex;gap:8px;margin-bottom:6px;flex-shrink:0}
.partner-grid .team-slot{
  width:52px;height:52px;border-radius:10px;border:2px dashed #DDD;
  display:flex;align-items:center;justify-content:center;
  font-size:10px;color:#CCC;text-align:center;flex-shrink:0;
  transition:all 0.15s ease;
}
.partner-grid .team-slot.filled{border-color:#C9A96E;border-style:solid;background:#FFFDF5;font-size:9px;font-weight:600;color:#333}
.partner-grid .team-slot.main-slot{border-color:#C9A96E;background:linear-gradient(135deg,#FFFDF5,#FFF);font-weight:700;font-size:11px;color:#C9A96E;border-style:solid}
.partner-grid .owned-title{font-size:13px;font-weight:700;color:#666;margin-top:4px;flex-shrink:0}
.partner-grid .owned-list{display:flex;flex-direction:column;gap:6px;overflow-y:auto;flex:1;min-height:0}
.partner-mini{
  display:flex;align-items:center;gap:10px;padding:8px 10px;
  background:#FAFAFA;border-radius:8px;border-left:4px solid #CCC;
  flex-shrink:0;transition:all 0.15s;
}
.partner-mini:hover{background:#F0F0F0}
.partner-mini .mini-head{
  width:28px;height:28px;border-radius:50%;flex-shrink:0;
  border:2px solid;
}
.partner-mini .mini-info{flex:1;min-width:0}
.partner-mini .mini-name{font-size:13px;font-weight:700;color:#333}
.partner-mini .mini-stats{font-size:10px;color:#888}
.partner-mini .mini-btn{
  padding:3px 10px;border:none;border-radius:6px;
  font-size:11px;font-weight:600;cursor:pointer;
  transition:all 0.15s;
}
.partner-mini .mini-btn.equip{background:#C9A96E;color:#FFF}
.partner-mini .mini-btn.unequip{background:#E74C3C;color:#FFF}
.partner-mini .mini-btn:hover{opacity:0.85}

// ==================== DERIVED STATS ====================
function realmData(){return REALMS[player.realmIndex]}
function equipTotal(stat){
  let sum=0;
  const slots=['weapon','armor','accessory'];
  for(const s of slots){
    if(player.equipment[s])sum+=player.equipment[s][stat]||0;
  }
  return sum;
}
function manualBonus(stat){
  let bonus=0;
  for(const mid of player.completedManuals){
    const m=MANUALS.find(x=>x.id===mid);
    if(!m)continue;
    if(m.effects.allAttr&&(stat==='atkMul'||stat==='defMul'||stat==='hpMax'||stat==='qiMax'))bonus+=m.effects.allAttr;
    if(m.effects[stat])bonus+=m.effects[stat];
  }
  return bonus;
}
function rebirthBonus(){return Math.pow(1.2,player.rebirthCount)}
function beastBonus(stat){
  if(!player.activeBeast)return 0;
  const b=BEASTS.find(x=>x.id===player.activeBeast);
  if(!b)return 0;
  const owned=player.spiritBeasts.find(sb=>sb.id===player.activeBeast);
  const evolution=(owned&&owned.evolution)||0;
  let val=b.effects[stat]||0;
  if(evolution>0&&b.evolutions){
    const evo=b.evolutions[evolution-1];
    if(evo&&evo.effects)val+=evo.effects[stat]||0;
  }
  if(owned&&owned.level){
    val=Math.floor(val*(1+(owned.level-1)*0.01));
  }
  return val;
}
function costumeBonus(stat){
  if(!player.activeCostume)return 0;
  const c=COSTUMES.find(x=>x.id===player.activeCostume);
  if(!c)return 0;
  return c.effects[stat]||0;
}
function titleBonus(stat){
  if(!player.activeTitle)return 0;
  const t=TITLES.find(x=>x.id===player.activeTitle);
  if(!t)return 0;
  return t.effects[stat]||0;
}
function caveProdBonus(){
  const titleBonusVal=titleBonus('caveProd')||0;
  return 1+titleBonusVal;
}
function getExploreExtra(){
  return titleBonus('exploreExtra')||0;
}
function effectiveCritRate(){var cr=player.critRate+equipTotal('crit')+manualBonus('critRate')+beastBonus('critBonus')+costumeBonus('critBonus')+titleBonus('critBonus');if(player.bossRush&&player.bossRush.active&&player.bossRush.buffs.crit)cr+=(player.bossRush.buffs.crit||0)*100;return cr}
function maxHp(){return Math.floor(player.baseHp*realmData().hpMul*(1+manualBonus('hpMax')+titleBonus('allAttr')+costumeBonus('allAttr'))*rebirthBonus())+equipEnhancedTotal('hp')+(costumeBonus('hpBonus')||0)+(titleBonus('hpBonus')||0)+((player.permaPillStats||{}).maxHp||0)}
function maxQi(){return Math.floor(player.baseQi*realmData().hpMul*(1+manualBonus('qiMax')+titleBonus('allAttr')+costumeBonus('allAttr'))*rebirthBonus())+((player.permaPillStats||{}).maxQi||0)}
function attack(){var atk=Math.floor(player.baseAtk*realmData().atkMul*(1+manualBonus('atkMul')+titleBonus('allAttr')+costumeBonus('allAttr'))*rebirthBonus())+equipEnhancedTotal('atk')+beastBonus('atkBonus')+(costumeBonus('atkBonus')||0)+(titleBonus('atkBonus')||0)+((player.permaPillStats||{}).atk||0);if(player.bossRush&&player.bossRush.active)atk=Math.floor(atk*(1+(player.bossRush.buffs.atk||0)));return atk}
function defense(){var base=Math.floor(player.baseDef*realmData().defMul*(1+manualBonus('defMul')+titleBonus('allAttr')+costumeBonus('allAttr'))*rebirthBonus())+equipEnhancedTotal('def')+beastBonus('defBonus')+(costumeBonus('defBonus')||0)+(titleBonus('defBonus')||0)+((player.permaPillStats||{}).def||0);if(player.bossRush&&player.bossRush.active)return Math.floor(base*(1+(player.bossRush.buffs.def||0)));return base}
function playerAttackInterval(){var base=4.0*(1-beastBonus('speedUp')-(costumeBonus('speedUp')||0));if(player.activeBuffs){var sb=player.activeBuffs.find(function(b){return b.type==='speedBuff'});if(sb)base*=(1-sb.value)}return Math.max(0.3,base)}
function realmLevel(){return player.realmIndex+1}
function expForNextLayer(){return 100*realmLevel()*player.layer}
function realmFullName(){return REALMS[player.realmIndex].name+' · '+player.layer+'层'}

function availableEnemies(){
  return ENEMIES.filter(e=>e.realmMin<=player.realmIndex);
}

// ==================== COMBAT ====================
function addLog(msg,cls){
  const log=document.getElementById('combatLog');
  const div=document.createElement('div');
  div.className='log-entry'+(cls?' '+cls:'');
  div.textContent=msg;
  log.insertBefore(div,log.firstChild);
  combatData.logCount++;
  // 限制最多200条
  if(combatData.logCount>200){
    while(log.children.length>200)log.removeChild(log.lastChild);
  }
}

function getAliveEnemies(){
  return combatData.enemies.filter(e=>e!==null&&e.hp>0);
}

function enemySlotName(idx){
  const marks=['①','②','③'];
  const en=combatData.enemies[idx];
  if(!en)return '—';
  return en.template.name+marks[idx];
}

function generateEnemies(){
  // Tower mode: single custom enemy
  if(combatMode==='tower'&&towerEnemyData){return [null,{template:towerEnemyData,hp:towerEnemyData.hp},null];}
  const pool=availableEnemies();
  if(pool.length===0)return[null,null,null];
  const bosses=pool.filter(e=>e.isBoss);
  const normals=pool.filter(e=>!e.isBoss);
  const maxCount=Math.min(3,pool.length);
  const count=1+Math.floor(Math.random()*maxCount);
  const result=[null,null,null];
  const usedNames=new Set();

  if(count===1){
    const pick=pool[Math.floor(Math.random()*pool.length)];
    result[1]={template:pick,hp:pick.hp};
    usedNames.add(pick.name);
  }else{
    if(bosses.length>0){
      const boss=bosses[Math.floor(Math.random()*bosses.length)];
      result[1]={template:boss,hp:boss.hp};
      usedNames.add(boss.name);
    }
    const slotsToFill=result[1]?[0,2]:[0,1,2];
    for(let i=slotsToFill.length-1;i>0;i--){
      const j=Math.floor(Math.random()*(i+1));
      [slotsToFill[i],slotsToFill[j]]=[slotsToFill[j],slotsToFill[i]];
    }
    let filled=result[1]?1:0;
    const shuffledNormals=[...normals].sort(()=>Math.random()-0.5);
    for(const n of shuffledNormals){
      if(filled>=count)break;
      if(usedNames.has(n.name))continue;
      const slot=slotsToFill[filled-(result[1]?1:0)];
      result[slot]={template:n,hp:n.hp};
      usedNames.add(n.name);
      filled++;
    }
    if(filled<count){
      const allPool=[...pool].sort(()=>Math.random()-0.5);
      for(const e of allPool){
        if(filled>=count)break;
        const emptySlots=result.map((v,i)=>v===null?i:-1).filter(i=>i>=0);
        if(emptySlots.length===0)break;
        result[emptySlots[0]]={template:e,hp:e.hp};
        filled++;
      }
    }
  }
  return result;
}

function startCombat(){
  if(gameState.inCombat){addLog('战斗已在进行中！','log-info');return}
  closePanel();
  const enemies=generateEnemies();
  const alive=enemies.filter(e=>e!==null);
  if(alive.length===0){addLog('当前境界无可挑战的敌人。','log-info');return}

  combatData.enemies=enemies;
  combatData.currentTarget=alive[0]?enemies.indexOf(alive[0]):1;
  combatData.playerHp=maxHp();
  combatData.logCount=0;
  combatData.playerLastAttack=Date.now();
  combatData.partnerLastAttack={};
  combatData.partnerHps={};

  // Init partner HPs and lastAttack
  const activePartners=getActivePartners();
  for(const p of activePartners){
    combatData.partnerHps[p.id]=p.baseHp;
    combatData.partnerLastAttack[p.id]=Date.now();
  }

  // Init enemy attack timings
  for(const e of enemies){
    if(e!==null){
      e.lastAttack=Date.now();
      e.attackInterval=3.0+Math.random()*2.0;
    }
  }

  addLog('——————————————','log-info');
  const names=alive.map(e=>enemySlotName(enemies.indexOf(e))).join('、');
  addLog('⚔ 遭遇 '+names+'！','log-info');
  addLog('——————————————','log-info');

  updateEnemyUI();
  gameState.inCombat=true;
  player.skillCooldowns={};player.defBuff=0;
  // Init partner skill cooldowns
  for(const p of activePartners){p.skillCooldowns={};}
  document.getElementById('btnFight').textContent='战斗中...';
  document.getElementById('btnFight').style.opacity='0.6';
  combatData.tickIntervalId=setInterval(combatTick,100);
}


function getActivePartners(){
  const result=[];
  for(const pid of player.activeTeam){
    if(!pid)continue;
    const p=player.partners.find(x=>x.id===pid);
    if(p)result.push(p);
  }
  return result;
}

function combatTick(){
  if(!gameState.inCombat)return;
  const now=Date.now();
  let alive=getAliveEnemies();
  if(alive.length===0){endCombat(true);return}

  const activePartners=getActivePartners();
  const pDef=defense();

  // --- Player attack ---
  if(now - combatData.playerLastAttack >= playerAttackInterval()*1000){
    // Skill CD decrement
    for(const k in player.skillCooldowns){if(player.skillCooldowns[k]>0)player.skillCooldowns[k]--;}
    if(player.defBuff>0)player.defBuff--;

    const availableSkill=player.equippedSkills.map((sid,i)=>sid?{sid,idx:i}:null).filter(Boolean).find(({sid})=>{
      const sk=SKILLS.find(s=>s.id===sid);
      if(!sk)return false;
      if(player.skillCooldowns[sid]&&player.skillCooldowns[sid]>0)return false;
      if(player.qi<sk.costQi)return false;
      if(sk.id==='xmdx'&&combatData.playerHp<=Math.floor(maxHp()*0.1))return false;
      return true;
    });
    if(availableSkill){
      applySkillInTick(availableSkill.sid,'player','无名修士');
    }else{
      alive=getAliveEnemies();
      if(alive.length>0){
        const target=alive[Math.floor(Math.random()*alive.length)];
        const targetIdx=combatData.enemies.indexOf(target);
        combatData.currentTarget=targetIdx;
        let rawDmg=Math.max(1,attack()-target.template.def);
        let isCrit=Math.random()*100<effectiveCritRate();
        let dmg=isCrit?Math.floor(rawDmg*1.8):rawDmg;
        target.hp-=dmg;if(target.hp<0)target.hp=0;
        const eName=enemySlotName(targetIdx);
        if(isCrit){addLog('⚡ 暴击！[无名修士] 普通攻击 ['+eName+'] 造成 '+dmg+' 点伤害','log-crit');}
        else{addLog('[无名修士] 普通攻击 ['+eName+'] 造成 '+dmg+' 点伤害');}
        if(target.hp<=0){addLog('['+eName+'] 被击败！','log-victory');}
        // Treasure: 噬血幡 lifesteal & 雷珠 chain lightning
        for(const tid of (player.activeTreasures||[])){
          if(!tid)continue;
          const tr=TREASURES.find(x=>x.id===tid);
          if(!tr)continue;
          if(tr.effect==='lifeSteal'){
            const heal=Math.floor(dmg*0.05);
            combatData.playerHp=Math.min(maxHp(),combatData.playerHp+heal);
          }
          if(tr.effect==='thunderChain'&&Math.random()<0.3){
            const otherAlive=getAliveEnemies().filter(e=>e!==target);
            if(otherAlive.length>0){
              const chainTarget=otherAlive[Math.floor(Math.random()*otherAlive.length)];
              const chainDmg=Math.floor(dmg*0.4);
              chainTarget.hp-=chainDmg;
              if(chainTarget.hp<0)chainTarget.hp=0;
              addLog('⚡ 雷珠连锁闪电 ['+enemySlotName(combatData.enemies.indexOf(chainTarget))+'] 造成 '+chainDmg+' 点伤害','log-info');
              if(chainTarget.hp<=0)addLog('['+enemySlotName(combatData.enemies.indexOf(chainTarget))+'] 被击败！','log-victory');
            }
          }
        }
      }
    }
    combatData.playerLastAttack=now;
  }

  // --- Partner attacks ---
  for(const p of activePartners){
    alive=getAliveEnemies();
    if(alive.length===0)break;
    if(!combatData.partnerLastAttack[p.id])combatData.partnerLastAttack[p.id]=now;
    if(now - combatData.partnerLastAttack[p.id] >= p.attackInterval*1000){
      // Partner skill CD decrement
      if(!p.skillCooldowns)p.skillCooldowns={};
      for(const k in p.skillCooldowns){if(p.skillCooldowns[k]>0)p.skillCooldowns[k]--;}

      if(!p.equippedSkills)p.equippedSkills=[];
      const pAvailSkill=p.equippedSkills.filter(Boolean).find(sid=>{
        const sk=SKILLS.find(s=>s.id===sid);
        if(!sk)return false;
        if(p.skillCooldowns&&p.skillCooldowns[sid]&&p.skillCooldowns[sid]>0)return false;
        return true;
      });
      if(pAvailSkill){
        const sk=SKILLS.find(s=>s.id===pAvailSkill);
        if(sk){
          p.skillCooldowns[pAvailSkill]=sk.cd;
          if(sk.dmgMul>0){
            const target=alive[Math.floor(Math.random()*alive.length)];
            const targetIdx=combatData.enemies.indexOf(target);
            let rawDmg=Math.max(1,Math.floor(p.baseAtk*sk.dmgMul)-target.template.def);
            const isCrit=Math.random()*100<5;
            const dmg=isCrit?Math.floor(rawDmg*1.8):rawDmg;
            target.hp-=dmg;if(target.hp<0)target.hp=0;
            const eName=enemySlotName(targetIdx);
            if(isCrit){addLog('⚡ 暴击！['+p.name+'] 使用 '+sk.name+' 对 ['+eName+'] 造成 '+dmg+' 点伤害','log-crit');}
            else{addLog('['+p.name+'] 使用 '+sk.name+' 对 ['+eName+'] 造成 '+dmg+' 点伤害');}
            if(target.hp<=0){addLog('['+eName+'] 被击败！','log-victory');}
          }else if(sk.id==='hcs'){
            const heal=Math.floor(maxHp()*0.2);
            combatData.playerHp=Math.min(maxHp(),combatData.playerHp+heal);
            addLog('['+p.name+'] 使用 回春术 回复 '+heal+' 点生命','log-info');
          }else if(sk.id==='jgbh'){
            player.defBuff=2;
            addLog('['+p.name+'] 使用 金刚不坏 防御翻倍2回合','log-info');
          }
        }
      }else{
        const target=alive[Math.floor(Math.random()*alive.length)];
        const targetIdx=combatData.enemies.indexOf(target);
        let rawDmg=Math.max(1,p.baseAtk-target.template.def);
        const isCrit=Math.random()*100<5;
        const dmg=isCrit?Math.floor(rawDmg*1.8):rawDmg;
        target.hp-=dmg;if(target.hp<0)target.hp=0;
        const eName=enemySlotName(targetIdx);
        if(isCrit){addLog('⚡ 暴击！['+p.name+'] 普通攻击 ['+eName+'] 造成 '+dmg+' 点伤害','log-crit');}
        else{addLog('['+p.name+'] 普通攻击 ['+eName+'] 造成 '+dmg+' 点伤害');}
        if(target.hp<=0){addLog('['+eName+'] 被击败！','log-victory');}
      }
      combatData.partnerLastAttack[p.id]=now;
    }
  }

  // Check victory
  const stillAlive=getAliveEnemies();
  if(stillAlive.length===0){
    let totalQi=0,totalExp=0;
    const defeatedNames=[];
    for(const e of combatData.enemies){
      if(e===null)continue;
      totalQi+=e.template.dropQi;
      totalExp+=e.template.dropExp;
      defeatedNames.push(enemySlotName(combatData.enemies.indexOf(e)));
    }
    addLog('战斗胜利！击败 '+defeatedNames.join('、')+'，获得 '+totalQi+' 灵力、'+totalExp+' 经验','log-victory');
    addLog('——————————————————','log-info');
    player.lingshi+=totalQi;
    player.qi+=totalQi;
    player.exp+=totalExp;
    // Track bestiary kills
    for(const e of combatData.enemies){if(e!==null&&e.template)trackBestiaryKill(e.template.id);}
    checkLayerUp();
    endCombat(true);
    return;
  }

  // --- Enemy attacks ---
  // --- Treasure offensive effects ---
  const activeTreasures=player.activeTreasures||[];
  for(const tid of activeTreasures){
    if(!tid)continue;
    const tr=TREASURES.find(x=>x.id===tid);
    if(!tr)continue;
    // 飞剑：每5秒自动攻击
    if(tr.effect==='flySword'){
      if(!combatData.lastFlySwordTime)combatData.lastFlySwordTime=now;
      if(now-combatData.lastFlySwordTime>=5000){
        alive=getAliveEnemies();
        if(alive.length>0){
          const target=alive[Math.floor(Math.random()*alive.length)];
          const targetIdx=combatData.enemies.indexOf(target);
          let dmg=Math.max(1,Math.floor(attack()*0.5)-target.template.def);
          target.hp-=dmg;if(target.hp<0)target.hp=0;
          addLog('🗡 飞剑自动攻击 ['+enemySlotName(targetIdx)+'] 造成 '+dmg+' 点伤害','log-info');
          if(target.hp<=0)addLog('['+enemySlotName(targetIdx)+'] 被击败！','log-victory');
        }
        combatData.lastFlySwordTime=now;
      }
    }
    // 聚灵珠：每秒回复1%灵力
    if(tr.effect==='qiRegen'){
      player.qi=Math.min(maxQi(),player.qi+Math.floor(maxQi()*0.01));
    }
  }
  // --- Enemy attacks ---
  // Build ally list: player + alive partners
  const allies=[{type:'player',id:'player',name:'无名修士',dodgeRate:player.dodgeRate}];
  for(const p of activePartners){
    const pHp=combatData.partnerHps[p.id];
    if(pHp===undefined||pHp>0){
      allies.push({type:'partner',id:p.id,name:p.name,dodgeRate:0});
    }
  }

  for(const e of stillAlive){
    if(!e.lastAttack)e.lastAttack=now;
    if(!e.attackInterval)e.attackInterval=3.0+Math.random()*2.0;
    if(now - e.lastAttack < e.attackInterval*1000)continue;

    e.lastAttack=now;
    const eIdx=combatData.enemies.indexOf(e);
    const ename=enemySlotName(eIdx);

    // Pick random alive ally
    const aliveAllies=allies.filter(a=>{
      if(a.type==='player')return combatData.playerHp>0;
      const hp=combatData.partnerHps[a.id];
      return hp===undefined||hp>0;
    });
    if(aliveAllies.length===0)break;

    const target=aliveAllies[Math.floor(Math.random()*aliveAllies.length)];
    const targetDef=target.type==='player'?(player.defBuff>0?pDef*2:pDef):0;
    let eDmg=Math.max(1,e.template.atk-targetDef);

    let isDodge=Math.random()*100<target.dodgeRate;
    if(isDodge){
      addLog('['+target.name+'] 闪避了 ['+ename+'] 的攻击！','log-dodge');
    }else{
      if(target.type==='player'){
        combatData.playerHp-=eDmg;
        if(combatData.playerHp<0)combatData.playerHp=0;
      }else{
        combatData.partnerHps[target.id]-=eDmg;
        if(combatData.partnerHps[target.id]<0)combatData.partnerHps[target.id]=0;
      }
      addLog('['+ename+'] 攻击 ['+target.name+'] 造成 '+eDmg+' 点伤害');
      // Treasure defensive effects
      if(target.type==='player'){
        for(const tid of (player.activeTreasures||[])){
          if(!tid)continue;
          const tr=TREASURES.find(x=>x.id===tid);
          if(!tr)continue;
          if(tr.effect==='lotusBlock'&&Math.random()<0.15){
            combatData.playerHp+=eDmg;
            if(combatData.playerHp>maxHp())combatData.playerHp=maxHp();
            addLog('🪷 青莲盾格挡了攻击！','log-info');
          }else if(tr.effect==='reflectShield'){
            const reflectDmg=Math.floor(eDmg*0.1);
            e.hp-=reflectDmg;
            if(e.hp<0)e.hp=0;
            if(reflectDmg>0)addLog('🛡 护心镜反弹 '+reflectDmg+' 点伤害给 ['+ename+']','log-info');
            if(e.hp<=0)addLog('['+ename+'] 被反弹致死！','log-victory');
          }
        }
      }
    }
    const eSprite=document.getElementById('enemySprite'+eIdx);
    if(eSprite){eSprite.classList.add('attacking');setTimeout(()=>eSprite.classList.remove('attacking'),200);}

    if(target.type==='player'&&combatData.playerHp<=0)addLog('[无名修士] 被击败！','log-defeat');
    else if(target.type==='partner'&&combatData.partnerHps[target.id]<=0)addLog('['+target.name+'] 被击败！','log-defeat');
  }

  updateEnemyUI();
  renderCharCardList();

  // Check defeat: player and all partners dead
  const allAlliesDead=combatData.playerHp<=0 && activePartners.every(p=>{
    const hp=combatData.partnerHps[p.id];
    return hp!==undefined&&hp<=0;
  });
  if(allAlliesDead){
    addLog('你被击败了...','log-defeat');
    addLog('——————————————————','log-info');
    combatData.playerHp=maxHp();
    endCombat(false);
  }
}

function applySkillInTick(skillId,actor,actorName){
  const sk=SKILLS.find(s=>s.id===skillId);
  if(!sk)return;
  const isPlayer=(actor==='player');
  const cooldowns=isPlayer?player.skillCooldowns:(actor.skillCooldowns||{});

  if(isPlayer){
    player.qi-=sk.costQi;if(player.qi<0)player.qi=0;
  }
  cooldowns[skillId]=sk.cd;

  if(sk.id==='jgbh'){
    player.defBuff=2;
    addLog('['+actorName+'] 🛡 金刚不坏 防御翻倍，持续2回合！','log-info');
  }else if(sk.id==='hcs'){
    const heal=Math.floor(maxHp()*0.2);
    combatData.playerHp=Math.min(maxHp(),combatData.playerHp+heal);
    addLog('['+actorName+'] 💚 回春术 回复 '+heal+' 点生命','log-info');
  }else if(sk.dmgMul>0){
    const alive=getAliveEnemies();
    if(alive.length===0)return;
    const atkVal=isPlayer?attack():actor.baseAtk;
    const critRateVal=isPlayer?effectiveCritRate():5;
    const target=alive[Math.floor(Math.random()*alive.length)];
    const targetIdx=combatData.enemies.indexOf(target);
    combatData.currentTarget=targetIdx;
    let rawDmg=Math.max(1,Math.floor(atkVal*sk.dmgMul)-target.template.def);
    let isCrit=Math.random()*100<critRateVal;
    let dmg=isCrit?Math.floor(rawDmg*1.8):rawDmg;
    target.hp-=dmg;
    if(target.hp<0)target.hp=0;
    const eName=enemySlotName(targetIdx);
    if(isCrit){
      addLog('⚡ 暴击！['+actorName+'] 使用 '+sk.name+' 对 ['+eName+'] 造成 '+dmg+' 点伤害','log-crit');
    }else{
      addLog('['+actorName+'] 使用 '+sk.name+' 对 ['+eName+'] 造成 '+dmg+' 点伤害');
    }
    if(target.hp<=0){addLog('['+eName+'] 被击败！','log-victory');}
    // xmdx hp cost
    if(sk.id==='xmdx'&&isPlayer){
      const costHp=Math.floor(maxHp()*0.1);
      combatData.playerHp=Math.max(1,combatData.playerHp-costHp);
    }
  }
  updateEnemyUI();
}

function autoEquip(){
  for(const item of player.inventory){
    if(item.type!=='equipment')continue;
    const slot=item.slot;
    const cur=player.equipment[slot];
    if(!cur){
      player.equipment[slot]=item;
      player.inventory=player.inventory.filter(i=>i!==item);
      addLog('[装备] '+item.name+' ('+item.quality+')','log-info');
    }else{
      const curIdx=QUALITY_ORDER.indexOf(cur.quality);
      const newIdx=QUALITY_ORDER.indexOf(item.quality);
      if(newIdx>curIdx){
        player.inventory.push(cur);
        player.equipment[slot]=item;
        player.inventory=player.inventory.filter(i=>i!==item);
        addLog('[替换] '+cur.name+' → '+item.name+' ('+item.quality+')','log-info');
      }
    }
  }
}

function endCombat(victory){
  // Tower mode: advance floor on win
  if(victory&&combatMode==='tower'){player.tower.floor++;player.tower.maxFloor=Math.max(player.tower.maxFloor,player.tower.floor);addLog('🗼 爬塔成功！进入第'+player.tower.floor+'层','log-victory');}
  combatMode=null;towerEnemyData=null;
  const wasVictory=victory!==undefined?victory:true;
  // Boss rush mode check
  if(player.bossRush&&player.bossRush.active&&wasVictory){
    if(combatData.tickIntervalId){clearInterval(combatData.tickIntervalId);combatData.tickIntervalId=null}
    document.getElementById('btnFight').textContent='连战中...';
    document.getElementById('btnFight').style.opacity='0.6';
    combatData.enemies=[null,null,null];
    combatData.currentTarget=0;
    updateEnemyUI();
    saveGame();
    onBossRushWaveClear();
    return;
  }
  // Boss rush: player died
  if(player.bossRush&&player.bossRush.active&&!wasVictory){
    if(combatData.tickIntervalId){clearInterval(combatData.tickIntervalId);combatData.tickIntervalId=null}
    const wins=player.bossRush.wins;
    const bonusLingshi=wins*200;
    player.lingshi+=bonusLingshi;
    const oldRecord=player.bossRush.record||0;
    if(wins>oldRecord)player.bossRush.record=wins;
    player.bossRush.active=false;player.bossRush.wave=0;player.bossRush.buffs={};player.bossRush.rushHp=0;
    gameState.inCombat=false;
    combatData.enemies=[null,null,null];combatData.currentTarget=0;
    document.getElementById('btnFight').textContent='开始战斗';
    document.getElementById('btnFight').style.opacity='1';
    addLog('Boss连战战败！已击败'+wins+'波。获得灵石+'+bonusLingshi,'log-defeat');
    updateEnemyUI();
    updateAllUI();
    saveGame();
    return;
  }
  // Normal end combat
  if(wasVictory){
    if(Math.random()<0.3){
      const drop=EQUIPMENT_POOL[Math.floor(Math.random()*EQUIPMENT_POOL.length)];
      if(player.inventory.length>=(player.inventorySize||30)){addLog('背包已满，装备掉落丢失','log-info');}
      else{player.inventory.push({...drop,type:'equipment'});addLog('[获得] '+drop.name+' ('+drop.quality+')','log-victory');autoEquip();}
    }
    // Quest progress: kill counts + totalKills
    player.totalKills+=combatData.enemies.filter(e=>e!==null).length;
    for(const e of combatData.enemies){
      if(e===null)continue;
      updateQuestProgress('kill',e.template.name,1);
    }
    updateQuestProgress('total_kill',null,0);
    checkAllQuests();
    checkAchievements();
    player.skillPoints=(player.skillPoints||0)+1;
      // 5% chance treasure fragment drop
    if(Math.random()<0.05){
      const fragType=generateTreasureFragment();
      addTreasureFragment(fragType);
    }
    // 2% chance random manual fragment drop
    if(Math.random()<0.02){
      const incompleteManuals=MANUALS.filter(m=>!player.completedManuals.includes(m.id));
      if(incompleteManuals.length>0){
        const m=incompleteManuals[Math.floor(Math.random()*incompleteManuals.length)];
        if(!player.manualFragments)player.manualFragments={};
        player.manualFragments[m.id]=(player.manualFragments[m.id]||0)+1;
        addLog('[获得] '+m.name+'残卷 ('+player.manualFragments[m.id]+'/'+m.fragments+')','log-victory');
      }
    }
  }
  gameState.inCombat=false;
  if(combatData.tickIntervalId){clearInterval(combatData.tickIntervalId);combatData.tickIntervalId=null}
  document.getElementById('btnFight').textContent='开始战斗';
  document.getElementById('btnFight').style.opacity='1';
  combatData.enemies=[null,null,null];
  combatData.currentTarget=0;
  updateEnemyUI();
  updateAllUI();
  saveGame();
}

function updateEnemyUI(){
  for(let i=0;i<3;i++){
    const en=combatData.enemies[i];
    const slot=document.getElementById('enemySlot'+i);
    const card=document.getElementById('enemyCard'+i);
    const spriteBody=document.getElementById('enemySprite'+i);

    if(!en){
      slot.classList.add('empty');
      card.classList.remove('active');
      document.getElementById('enemySpriteLabel'+i).textContent='';
      if(spriteBody){spriteBody.className='sprite-body enemy';}
      document.getElementById('enemyBossTag'+i).style.display='none';
      continue;
    }

    slot.classList.remove('empty');
    card.classList.add('visible');
    if(i===combatData.currentTarget&&en.hp>0){
      card.classList.add('active');
    }else{
      card.classList.remove('active');
    }

    const t=en.template;
    const realmName=t.realmMin<REALMS.length?REALMS[t.realmMin].name:'未知';
    const bossTag=document.getElementById('enemyBossTag'+i);
    if(t.isBoss){bossTag.style.display='inline'}else{bossTag.style.display='none'}

    document.getElementById('enemyName'+i).textContent=t.name;
    document.getElementById('enemyRealmTag'+i).textContent=realmName;
    document.getElementById('enemyHpLabel'+i).textContent=en.hp+'/'+t.hp;
    document.getElementById('enemyHpBar'+i).style.width=(en.hp/t.hp*100)+'%';
    document.getElementById('enemyAtk'+i).textContent=t.atk;
    document.getElementById('enemyDef'+i).textContent=t.def;
    document.getElementById('enemyCrit'+i).textContent=t.critRate+'%';
    document.getElementById('enemyDodge'+i).textContent=t.dodgeRate+'%';
    document.getElementById('enemyMaxHp'+i).textContent=t.hp;
    document.getElementById('enemyRealm'+i).textContent=realmName;
    document.getElementById('enemyDropQi'+i).textContent=t.dropQi;
    document.getElementById('enemyDropExp'+i).textContent=t.dropExp;
    document.getElementById('enemySpriteLabel'+i).textContent=t.name;

    if(t.isBoss){
      spriteBody.className='sprite-body boss';
    }else{
      spriteBody.className='sprite-body enemy';
    }
  }
}

// ==================== CULTIVATE ====================
function doCultivate(){
  if(gameState.inCombat){addLog('战斗中无法修炼！','log-info');return}
  const cost=Math.floor(player.qi*0.3);
  if(cost<20){addLog('灵力不足，无法闭关修炼（至少需要20灵力）','log-info');return}
  player.qi-=cost;
  const expGain=cost*2;
  player.exp+=expGain;
  addLog('🧘 闭关修炼：消耗 '+cost+' 灵力，获得 '+expGain+' 经验','log-info');
  checkLayerUp();
  updateAllUI();
  saveGame();
}

// ==================== EXPLORE ====================
function doExplore(){
  if(gameState.inCombat){addLog('战斗中无法探索秘境！','log-info');return}
  closePanel();

  const availableContinents=CONTINENTS.filter(c=>c.unlockRealm<=player.realmIndex);
  if(availableContinents.length===0){addLog('当前境界还无法离开新手村。','log-info');return}

  if(!player.divineSense)player.divineSense=0;
  if(!player.fortune)player.fortune=0;
  const dsLevel=Math.floor(player.divineSense/100);
  const ftLevel=Math.floor(player.fortune/50);

  let continent;
  if(dsLevel>=5&&availableContinents.length>=5){
    continent=availableContinents[availableContinents.length-1];
  }else{
    const weights=availableContinents.map((c,i)=>{return 1+i*0.5+dsLevel*0.3});
    const totalWeight=weights.reduce((a,b)=>a+b,0);
    let r=Math.random()*totalWeight;
    for(let i=0;i<availableContinents.length;i++){
      r-=weights[i];
      if(r<=0){continent=availableContinents[i];break;}
    }
  }

  const zones=EXPLORE_ZONES.filter(z=>z.continent===continent.id&&z.realmMin<=player.realmIndex);
  if(zones.length===0){addLog(continent.name+'的秘境还未开放。','log-info');return}
  const zone=zones[Math.floor(Math.random()*zones.length)];

  addLog('🗺 前往 '+continent.icon+' '+continent.name+' · '+zone.name,'log-info');
  addLog('   '+zone.desc,'log-info');

  const extraEvents=getExploreExtra();
  const totalEvents=1+extraEvents+(ftLevel>=3?1:0);

  for(let ei=0;ei<totalEvents;ei++){
    const totalWeight=zone.events.reduce((s,e)=>s+(e.weight||10),0);
    let r=Math.random()*totalWeight+ftLevel*Math.random()*3;
    let pickedEvent=zone.events[0];
    let cumulative=0;
    for(const ev of zone.events){
      cumulative+=ev.weight||10;
      if(r<=cumulative){pickedEvent=ev;break;}
    }

    if(pickedEvent.isDanger&&Math.random()<0.3-dsLevel*0.03){
      addLog('⚠ '+pickedEvent.name+'：'+pickedEvent.desc+'（神识感知，成功避开危险）','log-info');
      continue;
    }
    if(pickedEvent.isDanger){
      addLog('⚡ '+pickedEvent.name+'：'+pickedEvent.desc,'log-info');
    }else{
      addLog('🔍 '+pickedEvent.name+'：'+pickedEvent.desc,'log-info');
    }

    const rew=pickedEvent.reward;
    if(rew.lingshi){player.lingshi+=rew.lingshi;}
    if(rew.exp){player.exp+=rew.exp;}
    if(rew.qi){player.qi=Math.min(maxQi(),player.qi+rew.qi);}
    if(rew.herbs){player.caveResources.herbs=(player.caveResources.herbs||0)+rew.herbs;}
    if(rew.equipChance&&Math.random()<rew.equipChance){
      const drop=EQUIPMENT_POOL[Math.floor(Math.random()*EQUIPMENT_POOL.length)];
      player.inventory.push({...drop,type:'equipment'});
      addLog('[获得] '+drop.name+' ('+drop.quality+')','log-victory');
      autoEquip();
    }
    if(rew.lootChance&&Math.random()<rew.lootChance){
      const drops=[
        {name:'上古灵石',lingshi:300+Math.floor(Math.random()*500)},
        {name:'灵兽口粮',beastFood:true},
        {name:'稀有灵草',herbs:10+Math.floor(Math.random()*15)},
        {name:'功法残卷',manualFrag:true},
        {name:'天材地宝',celestialEssence:true}
      ];
      const drop=drops[Math.floor(Math.random()*drops.length)];
      if(drop.lingshi){player.lingshi+=drop.lingshi;addLog('[稀有掉落] '+drop.name+' ×'+drop.lingshi+'灵石','log-victory');}
      if(drop.beastFood){if(!player.enchantMaterials)player.enchantMaterials={};player.enchantMaterials.beastFood=(player.enchantMaterials.beastFood||0)+3;addLog('[稀有掉落] 灵兽口粮 ×3','log-victory');}
      if(drop.herbs){player.caveResources.herbs=(player.caveResources.herbs||0)+drop.herbs;addLog('[稀有掉落] '+drop.name+' ×'+drop.herbs,'log-victory');}
      if(drop.manualFrag){
        const incompleteManuals=MANUALS.filter(m=>!player.completedManuals.includes(m.id));
        if(incompleteManuals.length>0){
          const m=incompleteManuals[Math.floor(Math.random()*incompleteManuals.length)];
          if(!player.manualFragments)player.manualFragments={};
          player.manualFragments[m.id]=(player.manualFragments[m.id]||0)+1;
          addLog('[稀有掉落] '+m.name+'残卷','log-victory');
        }
      }
      if(drop.celestialEssence){if(!player.enchantMaterials)player.enchantMaterials={};player.enchantMaterials.celestialEssence=(player.enchantMaterials.celestialEssence||0)+1;addLog('[稀有掉落] 星辰精华 ×1','log-victory');}
    }
    if(rew.beastChance&&Math.random()<rew.beastChance){
      const availableBeasts=BEASTS.filter(b=>!player.spiritBeasts.some(sb=>sb.id===b.id));
      if(availableBeasts.length>0){
        const beast=availableBeasts[Math.floor(Math.random()*availableBeasts.length)];
        player.spiritBeasts.push({id:beast.id,level:1,exp:0,evolution:0});
        player.beastExp[beast.id]=0;
        addLog('🐾 发现灵兽：'+beast.name+'（'+beast.quality+'）！','log-victory');
      }
    }
    if(rew.hpRecovery){combatData.playerHp=maxHp();}
  }

  player.divineSense+=1+ftLevel*0.5;
  player.fortune+=Math.random()*2;
  player.lastExploreZone=zone.id;

  const bossChance=0.05+dsLevel*0.01;
  if(Math.random()<bossChance){
    const availableBosses=HIDDEN_BOSSES.filter(b=>b.unlockFn());
    if(availableBosses.length>0){
      const boss=availableBosses[Math.floor(Math.random()*availableBosses.length)];
      addLog('⚠ 探索中遭遇隐藏Boss：'+boss.name+'！','log-info');
      const pAtk=attack();const pDef=defense();const pHp=maxHp();
      let bossHp=boss.hp;
      let round=0;
      while(bossHp>0&&pHp>0&&round<50){
        round++;
        bossHp-=Math.max(1,pAtk-boss.def);
        if(bossHp<=0){
          addLog('击败隐藏Boss '+boss.name+'！获得 '+boss.dropQi+' 灵石、'+boss.dropExp+' 经验','log-victory');
          player.lingshi+=boss.dropQi;player.qi+=boss.dropQi;player.exp+=boss.dropExp;
          checkLayerUp();
          break;
        }
        const bDmg=Math.max(1,boss.atk-pDef);
        if(pHp-(round-1)*bDmg<=bDmg){addLog('被 '+boss.name+' 击败，仓皇撤退...','log-defeat');break;}
      }
    }
  }

  if(Math.random()<0.1){
    const availableBeasts=BEASTS.filter(b=>!player.spiritBeasts.some(sb=>sb.id===b.id));
    if(availableBeasts.length>0){
      const beast=availableBeasts[Math.floor(Math.random()*availableBeasts.length)];
      player.spiritBeasts.push({id:beast.id,level:1,exp:0,evolution:0});
      player.beastExp[beast.id]=0;
      addLog('🐾 发现灵兽：'+beast.name+'（'+beast.quality+'）！','log-victory');
    }
  }
  if(Math.random()<0.1){
    const incompleteManuals=MANUALS.filter(m=>!player.completedManuals.includes(m.id));
    if(incompleteManuals.length>0){
      const m=incompleteManuals[Math.floor(Math.random()*incompleteManuals.length)];
      if(!player.manualFragments)player.manualFragments={};
      player.manualFragments[m.id]=(player.manualFragments[m.id]||0)+1;
      addLog('[获得] '+m.name+'残卷 ('+player.manualFragments[m.id]+'/'+m.fragments+')','log-victory');
    }
  }
  if(!player.enchantMaterials)player.enchantMaterials={};
  player.enchantMaterials.enchantStones=(player.enchantMaterials.enchantStones||0)+Math.floor(Math.random()*3)+1;
  player.enchantMaterials.equipShards=(player.enchantMaterials.equipShards||0)+Math.floor(Math.random()*2)+1;
  if(Math.random()<0.3){
    const crystalTypes=['atk','def','hp','crit'];
    const ct=crystalTypes[Math.floor(Math.random()*crystalTypes.length)];
    if(!player.spiritCrystals)player.spiritCrystals={};
    player.spiritCrystals[ct]=(player.spiritCrystals[ct]||0)+1;
    const ctNames={atk:'攻击灵晶',def:'防御灵晶',hp:'生命灵晶',crit:'暴击灵晶'};
    addLog('[获得] '+ctNames[ct]+' ×1','log-info');
  }
  if(Math.random()<0.01){
    if(!player.enchantMaterials)player.enchantMaterials={};
    player.enchantMaterials.celestialEssence=(player.enchantMaterials.celestialEssence||0)+1;
    addLog('✨ [获得] 天材地宝·星辰精华 ×1（法宝进化材料）','log-victory');
  }
  if(Math.random()<0.03){
    const availableCostumes=COSTUMES.filter(c=>!player.ownedCostumes.includes(c.id)&&c.unlockRealm<=player.realmIndex&&c.unlockWay.indexOf('概率')>=0);
    if(availableCostumes.length>0){
      const costume=availableCostumes[Math.floor(Math.random()*availableCostumes.length)];
      player.ownedCostumes.push(costume.id);
      addLog('👘 [获得] 时装：'+costume.name+'（'+costume.quality+'）！','log-victory');
    }
  }

  checkTitleUnlocks();

  player.totalExplores++;
  checkAllQuests();
  updateAllUI();
  saveGame();
}

function checkTitleUnlocks(){
  for(var i=0;i<TITLES.length;i++){
    var t=TITLES[i];
    if(player.unlockedTitles.indexOf(t.id)>=0)continue;
    try{
      if(t.unlockCond()){
        player.unlockedTitles.push(t.id);
        addLog('🏅 解锁称号：'+t.name+'（'+t.quality+'）！','log-victory');
      }
    }catch(e){}
  }
}

function doRebirth(){
  if(gameState.inCombat){addLog('战斗中无法转生！','log-info');return}
  if(player.realmIndex<6){addLog('需达到大乘期方可转生。','log-info');return}
  if(confirm('转生将重置境界和装备，保留伙伴和功法。\n\n确认转生？')){
    player.rebirthCount++;
    player.rebirthStones++;
    player.realmIndex=0;
    player.layer=1;
    player.exp=0;
    player.qi=0;
    player.lingshi=Math.floor(player.lingshi*0.5);
    player.equipment={weapon:null,armor:null,accessory:null};
    player.equippedSkills=[];
    player.skillCooldowns={};
    player.defBuff=0;
    player.inventory=[];
    player.critRate=BASE_CRIT;
    player.dodgeRate=BASE_DODGE;
    addLog('🌀 转生成功！第 '+player.rebirthCount+' 世轮回开启，获得转生灵石×1','log-victory');
    addLog('全属性+'+Math.floor((rebirthBonus()-1)*100)+'%，渡劫成功率+'+(player.rebirthCount*5)+'%','log-info');
    updateAllUI();
    saveGame();
  }
}

// ==================== LAYER UP & BREAKTHROUGH ====================
function checkLayerUp(){
  let upgraded=false;
  while(player.exp>=expForNextLayer() && player.layer<10){
    player.exp-=expForNextLayer();
    player.layer++;
    upgraded=true;
    addLog('✨ 突破至 '+realmFullName()+'！实力有所提升','log-info');
  }
  if(upgraded){updateAllUI();saveGame()}
  updateBreakthroughBtn();
}

function updateBreakthroughBtn(){
  const btn=document.getElementById('btnBreakthrough');
  if(!btn)return;
  if(player.layer>=10 && player.qi>=realmData().qiGate && player.realmIndex<REALMS.length-1){
    btn.classList.add('show');
  }else{
    btn.classList.remove('show');
  }
}

function tribulationSuccessRate(){
  // 基础成功率
  const baseRates=[90,80,70,60,50,40,30,20];
  let rate=baseRates[Math.min(player.realmIndex,baseRates.length-1)];
  // 每本已圆满的天品以上功法+5%
  for(const mid of player.completedManuals){
    const m=MANUALS.find(x=>x.id===mid);
    if(!m)continue;
    if(QUALITY_ORDER.indexOf(m.quality)>=QUALITY_ORDER.indexOf('天品'))rate+=5;
  }
  // 每次转生+5%
  rate+=player.rebirthCount*5;
  return Math.min(rate,95);
}

function attemptBreakthrough(){
  if(player.layer<10){addLog('需修炼至10层圆满方可突破。','log-info');return}
  if(player.qi<realmData().qiGate){addLog('灵力不足，突破需要灵力达到'+realmData().qiGate+'。','log-info');return}
  if(player.realmIndex>=REALMS.length-1){addLog('已达最高境界！','log-info');return}
  startTribulation();
}

function startTribulation(){
  const nextRealm=REALMS[player.realmIndex+1];
  const rate=tribulationSuccessRate();
  player.tribulationCount++;
  const overlay=document.createElement('div');
  overlay.id='tribulationOverlay';
  overlay.style.cssText='position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);z-index:200;display:flex;align-items:center;justify-content:center';
  overlay.innerHTML='<div id="tribCard" style="background:#FFF;border-radius:12px;padding:28px 36px;max-width:440px;text-align:center;box-shadow:0 4px 30px rgba(201,169,110,0.4);transition:all 0.3s ease">'+
    '<div style="font-size:24px;font-weight:900;color:#C9A96E;margin-bottom:6px">渡劫 - '+nextRealm.name+'期</div>'+
    '<div style="font-size:14px;color:#888;margin-bottom:12px">成功率: <span style="color:#C9A96E;font-weight:700">'+rate+'%</span></div>'+
    '<div id="tribLightnings" style="display:flex;justify-content:center;gap:20px;margin-bottom:16px">'+
      '<div id="tribL0" style="width:60px;height:80px;border-radius:8px;background:#FFFDE7;border:2px solid #FFD700;display:flex;align-items:center;justify-content:center;font-size:32px;transition:all 0.4s ease">⚡</div>'+
      '<div id="tribL1" style="width:60px;height:80px;border-radius:8px;background:#FFFDE7;border:2px solid #FFD700;display:flex;align-items:center;justify-content:center;font-size:32px;transition:all 0.4s ease">⚡</div>'+
      '<div id="tribL2" style="width:60px;height:80px;border-radius:8px;background:#FFFDE7;border:2px solid #FFD700;display:flex;align-items:center;justify-content:center;font-size:32px;transition:all 0.4s ease">⚡</div>'+

  '</div>';
  document.body.appendChild(overlay);

  let step=0;const results=[];
  function nextLightning(){
    if(step>=3){
      const allSuccess=results.every(r=>r);
      setTimeout(()=>{
        if(overlay.parentNode)overlay.remove();
        if(allSuccess){
          doBreakthroughSuccess();
        }else{
          doBreakthroughFail();
        }
      },2000);
      return;
    }
    const card=document.getElementById('tribCard');
    const light=document.getElementById('tribL'+step);
    document.getElementById('tribMsg').textContent='第'+(step+1)+'道天雷落下！';
    // 闪烁效果
    if(card){card.style.boxShadow='0 4px 40px rgba(255,215,0,0.8)';setTimeout(()=>{card.style.boxShadow='0 4px 30px rgba(201,169,110,0.4)';},300);}
    const success=Math.random()*100<tribulationSuccessRate();
    results.push(success);
    if(success){
      light.style.background='#FFFDE7';
      light.style.borderColor='#FFD700';
      light.style.boxShadow='0 0 20px rgba(255,215,0,0.6)';
    }else{
      light.style.background='#FFE0E0';
      light.style.borderColor='#E74C3C';
      light.style.boxShadow='0 0 20px rgba(231,76,60,0.6)';
    }
    step++;
    if(step<3){
      setTimeout(nextLightning,1500);
    }else{
      setTimeout(nextLightning,1500);
    }
  }
  setTimeout(nextLightning,800);
}

function doBreakthroughSuccess(){
  player.tribulationSuccess++;
  player.realmIndex++;
  player.layer=1;
  player.exp=0;
  player.qi-=REALMS[player.realmIndex].qiGate;
  if(player.qi<0)player.qi=0;
  addLog('🔱 渡劫成功！晋升 '+realmFullName()+'！天地异象显现...','log-victory');
  showBreakthroughToast();
  updateAllUI();
  saveGame();

}

function doBreakthroughFail(){
  const loss=Math.floor(player.qi*0.5);
  player.qi-=loss;
  if(player.qi<0)player.qi=0;
  player.exp=Math.floor(player.exp*0.5);
  addLog('💀 渡劫失败！天雷击落，灵力损失 '+loss+'，经验减半','log-defeat');

function toggleIdle(){

  else{btn.textContent='挂机·关';btn.className='btn-idle-toggle off'}
  saveGame();

function idleTick(){
  if(!gameState.idleOn)return;
  if(gameState.inCombat)return;
  checkAdventureTrigger();
  const qiGain=realmLevel()*1.0*(1+manualBonus('qiRegen')+(titleBonus('qiRegenBonus')||0)+(costumeBonus('qiRegenBonus')||0));
  const expGain=realmLevel()*0.5*(1+(titleBonus('expBonus')||0)+(costumeBonus('expBonus')||0));
  player.qi+=qiGain;
  player.exp+=expGain;
  player.lingshi+=qiGain;
  // Cave production
  const now=Date.now();
  if(!player.lastCaveTick)player.lastCaveTick=now;
  const caveSecs=(now-player.lastCaveTick)/1000;
  if(caveSecs>=1){
    const ticks=Math.floor(caveSecs);
    player.lingshi+=player.cave.lingshiMine*2*ticks*caveProdBonus();
    player.caveResources.herbs+=player.cave.herbGarden*1*ticks*caveProdBonus();
    // Active beast gains exp
    if(player.activeBeast){
      const beastExpGain=0.5*ticks*(1+(titleBonus('beastExpBonus')||0));
      player.beastExp[player.activeBeast]=(player.beastExp[player.activeBeast]||0)+beastExpGain;
      checkBeastLevelUp(player.activeBeast);
    }
    // Divine sense cultivation
    player.divineSense=(player.divineSense||0)+0.02*ticks;
    player.lastCaveTick+=ticks*1000;
  }
  // Manual cultivation progress
  if(player.activeManuals.length>0){
    const speeds={凡品:0.08,灵品:0.06,地品:0.05,天品:0.04,仙品:0.03,神品:0.02};
    for(const mid of player.activeManuals){
      const m=MANUALS.find(x=>x.id===mid);
      if(!m||player.completedManuals.includes(mid))continue;
      const speed=speeds[m.quality]||0.05;
      player.manualProgress[mid]=(player.manualProgress[mid]||0)+speed;
      if(player.manualProgress[mid]>=100){
        player.manualProgress[mid]=100;
        player.activeManuals=player.activeManuals.filter(x=>x!==mid);
        player.completedManuals.push(mid);
        addLog('📖 功法圆满：'+m.name+'！属性永久生效','log-victory');
      }
    }
  }
  // Pill buff countdown
  if(player.activeBuffs&&player.activeBuffs.length>0){
    for(let i=player.activeBuffs.length-1;i>=0;i--){
      player.activeBuffs[i].remaining-=1;
      if(player.activeBuffs[i].remaining<=0)player.activeBuffs.splice(i,1);
    }
  }
  checkLayerUp();
  updateIdleUI();
  checkAllQuests();
}

function updateIdleUI(){
  const mQi=maxQi();
  const qiPct=Math.min(100,player.qi/mQi*100);
  document.getElementById('topQiBar').style.width=qiPct+'%';
  document.getElementById('topQiLabel').textContent=Math.floor(player.qi)+'/'+mQi;
  document.getElementById('topLingshi').textContent=Math.floor(player.lingshi);
  document.getElementById('topQiVal').textContent=Math.floor(player.qi);
  document.getElementById('topExpVal').textContent=Math.floor(player.exp);
}

function calcOfflineGains(){
  const now=Date.now();
  const elapsed=(now-gameState.lastSaveTime)/1000;
  if(elapsed<10)return;
  const maxSecs=86400;
  const secs=Math.min(elapsed,maxSecs);
  const qiGain=realmLevel()*0.5*secs*0.8;
  const expGain=realmLevel()*0.3*secs*0.8;
  player.qi+=qiGain;
  player.exp+=expGain;
  player.lingshi+=qiGain;
  addLog('⏳ 离线 '+formatDuration(secs)+'，获得 '+Math.floor(qiGain)+' 灵力、'+Math.floor(expGain)+' 经验（80%收益）','log-info');
  checkLayerUp();
}

function formatDuration(secs){
  if(secs<60)return Math.floor(secs)+'秒';
  if(secs<3600)return Math.floor(secs/60)+'分'+Math.floor(secs%60)+'秒';
  const h=Math.floor(secs/3600);
  const m=Math.floor((secs%3600)/60);
  return h+'小时'+m+'分钟';
}

function getRandomEquip(type,minStars,maxStars){
  const pool=EQUIPMENT_POOL.filter(e=>e.type===type&&e.stars>=minStars&&e.stars<=maxStars);
  if(pool.length===0)return EQUIPMENT_POOL[0];
  return {...pool[Math.floor(Math.random()*pool.length)],type:'equipment'};
}

// ==================== MANUAL SYSTEM ====================
function startCultivateManual(manualId){
  const m=MANUALS.find(x=>x.id===manualId);
  if(!m)return;
  if(player.completedManuals.includes(manualId)){addLog('该功法已圆满','log-info');return;}
  if(player.activeManuals.includes(manualId)){addLog('该功法已在修炼中','log-info');return;}
  if(player.activeManuals.length>=3){addLog('修炼槽已满（最多3个）','log-info');return;}
  if(player.lingshi<m.cultivateCost){addLog('灵石不足，需要'+m.cultivateCost+'灵石','log-info');return;}
  player.lingshi-=m.cultivateCost;
  player.activeManuals.push(manualId);
  if(!player.manualProgress[manualId])player.manualProgress[manualId]=0;
  addLog('📖 开始修炼功法：'+m.name+'（'+m.quality+'）','log-info');
  renderSkillPanel();
  updateAllUI();
  saveGame();
}
function stopCultivateManual(manualId){
  const idx=player.activeManuals.indexOf(manualId);
  if(idx>=0)player.activeManuals.splice(idx,1);
  player.manualProgress[manualId]=0;
  const m=MANUALS.find(x=>x.id===manualId);
  if(m)addLog('停止修炼：'+m.name,'log-info');
  renderSkillPanel();
  updateAllUI();
  saveGame();
}
