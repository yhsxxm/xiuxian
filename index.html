function showEquipTargetPicker(skillId){
  const overlay=document.createElement('div');
  overlay.className='equip-picker-overlay';
  overlay.id='equipPickerOverlay';
  let html='<div class="equip-picker-card">';
  html+='<div class="equip-picker-title">\u88c5\u5907\u6280\u80fd</div>';
  html+='<div class="equip-picker-sub">'+SKILLS.find(s=>s.id===skillId).name+' \u2014 \u9009\u62e9\u88c5\u5907\u7ed9\u54ea\u4e2a\u89d2\u8272</div>';

  const playerCount=player.equippedSkills.filter(Boolean).length;
  const playerMax=4;
  const playerFull=playerCount>=playerMax;
  html+='<div class="equip-picker-section"><div class="equip-picker-section-title">\u4e3b\u89d2</div>';
  html+='<div class="equip-picker-char'+(playerFull?' full':'')+'"'+(playerFull?'':' onclick="equipSkillToChar(\''+skillId+'\',\'player\')"')+'>';
  html+='<span class="char-label">\u65e0\u540d\u4fee\u58eb</span>';
  html+='<span class="char-slots">'+playerCount+'/'+playerMax+' \u69fd</span></div></div>';

  if(player.partners.length>0){
    html+='<div class="equip-picker-section"><div class="equip-picker-section-title">\u4f19\u4f34</div>';
    for(const p of player.partners){
      if(!p.equippedSkills)p.equippedSkills=[];
      const pCount=p.equippedSkills.filter(Boolean).length;
      const pMax=2;
      const pFull=pCount>=pMax;
      html+='<div class="equip-picker-char'+(pFull?' full':'')+'"'+(pFull?'':' onclick="equipSkillToChar(\''+skillId+'\',\'partner\',\''+p.id+'\')"')+'>';
      html+='<span class="char-label">'+p.name+'</span>';
      html+='<span class="char-slots">'+pCount+'/'+pMax+' \u69fd</span></div>';
    }
    html+='</div>';
  }

  html+='<button class="equip-picker-cancel" onclick="closeEquipTargetPicker()">\u53d6\u6d88</button></div>';
  overlay.innerHTML=html;
  document.body.appendChild(overlay);
  overlay.addEventListener('click',function(e){if(e.target===overlay)closeEquipTargetPicker();});
}

function closeEquipTargetPicker(){
  const overlay=document.getElementById('equipPickerOverlay');
  if(overlay)overlay.remove();
}

function equipSkillToChar(skillId,targetType,targetId){
  closeEquipTargetPicker();
  const sk=SKILLS.find(s=>s.id===skillId);
  if(!sk)return;

  if(targetType==='player'){
    if(player.equippedSkills.includes(skillId)){addLog('\u8be5\u6280\u80fd\u5df2\u88c5\u5907','log-info');return;}
    const emptyIdx=player.equippedSkills.findIndex(s=>!s);
    if(emptyIdx>=0){player.equippedSkills[emptyIdx]=skillId;}
    else if(player.equippedSkills.length<4){player.equippedSkills.push(skillId);}
    else{addLog('\u4e3b\u89d2\u6280\u80fd\u69fd\u5df2\u6ee1\uff08\u6700\u591a4\u4e2a\uff09','log-info');return;}
    if(!player.skillCooldowns[skillId])player.skillCooldowns[skillId]=0;
    addLog('[\u88c5\u5907\u6280\u80fd] '+sk.name+' \u2192 \u65e0\u540d\u4fee\u58eb','log-info');
  }else if(targetType==='partner'){
    const p=player.partners.find(x=>x.id===targetId);
    if(!p)return;
    if(!p.equippedSkills)p.equippedSkills=[];
    if(p.equippedSkills.includes(skillId)){addLog('\u8be5\u6280\u80fd\u5df2\u88c5\u5907\u7ed9 '+p.name,'log-info');return;}
    if(p.equippedSkills.filter(Boolean).length>=2){addLog(p.name+' \u6280\u80fd\u69fd\u5df2\u6ee1\uff08\u6700\u591a2\u4e2a\uff09','log-info');return;}
    p.equippedSkills.push(skillId);
    if(!p.skillCooldowns)p.skillCooldowns={};
    addLog('[\u88c5\u5907\u6280\u80fd] '+sk.name+' \u2192 '+p.name,'log-info');
  }

  renderSkillPanel();
  renderCharCardList();
  saveGame();
}

function unequipSkill(skillId){
  const pIdx=player.equippedSkills.indexOf(skillId);
  if(pIdx>=0){player.equippedSkills[pIdx]=null;delete player.skillCooldowns[skillId];}
  while(player.equippedSkills.length>0&&player.equippedSkills[player.equippedSkills.length-1]===null)player.equippedSkills.pop();
  for(const p of player.partners){
    if(!p.equippedSkills)continue;
    const ppIdx=p.equippedSkills.indexOf(skillId);
    if(ppIdx>=0){
      p.equippedSkills=p.equippedSkills.filter(s=>s!==skillId);
      if(p.skillCooldowns)delete p.skillCooldowns[skillId];
    }
  }
  addLog('[\u5378\u4e0b\u6280\u80fd] '+SKILLS.find(s=>s.id===skillId).name+' \uff08\u4ece\u6240\u6709\u89d2\u8272\uff09','log-info');
  renderSkillPanel();
  renderCharCardList();
  saveGame();
}

function unequipSkillFromChar(skillId,targetType,targetId){
  const sk=SKILLS.find(s=>s.id===skillId);
  if(targetType==='player'){
    const idx=player.equippedSkills.indexOf(skillId);
    if(idx>=0){player.equippedSkills[idx]=null;delete player.skillCooldowns[skillId];}
    while(player.equippedSkills.length>0&&player.equippedSkills[player.equippedSkills.length-1]===null)player.equippedSkills.pop();
    if(sk)addLog('[\u5378\u4e0b\u6280\u80fd] '+sk.name+' \u2190 \u65e0\u540d\u4fee\u58eb','log-info');
  }else if(targetType==='partner'){
    const p=player.partners.find(x=>x.id===targetId);
    if(p&&p.equippedSkills){
      p.equippedSkills=p.equippedSkills.filter(s=>s!==skillId);
      if(p.skillCooldowns)delete p.skillCooldowns[skillId];
      if(sk)addLog('[\u5378\u4e0b\u6280\u80fd] '+sk.name+' \u2190 '+p.name,'log-info');
    }
  }
  renderSkillPanel();
  renderCharCardList();
  saveGame();
}

function useSkill(skillId,actor,actorName){
  if(!gameState.inCombat)return;
  const sk=SKILLS.find(s=>s.id===skillId);
  if(!sk)return;
  const isPlayer=(actor==='player');
  const cooldowns=isPlayer?player.skillCooldowns:(actor.skillCooldowns||{});
  if(cooldowns[skillId]&&cooldowns[skillId]>0)return;
  if(isPlayer&&player.qi<sk.costQi)return;
  const atkVal=isPlayer?attack():actor.baseAtk;
  const critRateVal=isPlayer?effectiveCritRate():5;

  if(sk.id==='xmdx'&&isPlayer){
    const costHp=Math.floor(combatData.playerHp*0.1);
    if(combatData.playerHp<=costHp)return;
    combatData.playerHp-=costHp;
  }

  if(isPlayer){player.qi-=sk.costQi;if(player.qi<0)player.qi=0;}
  cooldowns[skillId]=sk.cd;

  if(sk.id==='jgbh'){
    player.defBuff=2;
    addLog('['+actorName+'] \ud83d\udee1 \u91d1\u521a\u4e0d\u574f \u9632\u5fa1\u7ffb\u500d\uff0c\u6301\u7eed2\u56de\u5408\uff01','log-info');
  }else if(sk.id==='hcs'){
    const heal=Math.floor(maxHp()*0.2);
    combatData.playerHp=Math.min(maxHp(),combatData.playerHp+heal);
    addLog('['+actorName+'] \ud83d\udc9a \u56de\u6625\u672f \u56de\u590d '+heal+' \u70b9\u751f\u547d','log-info');
  }else if(sk.dmgMul>0){
    const alive=getAliveEnemies();
    if(alive.length===0)return;
    const target=alive[Math.floor(Math.random()*alive.length)];
    const targetIdx=combatData.enemies.indexOf(target);
    combatData.currentTarget=targetIdx;
    let rawDmg=Math.max(1,Math.floor(atkVal*sk.dmgMul)-target.template.def);
    let isCrit=Math.random()*100<critRateVal;
    let dmg=isCrit?Math.floor(rawDmg*1.8):rawDmg;
    target.hp-=dmg;
    if(target.hp<0)target.hp=0;
    const eName=enemySlotName(targetIdx);
    if(isCrit){
      addLog('\u26a1 \u66b4\u51fb\uff01['+actorName+'] \u4f7f\u7528 '+sk.name+' \u5bf9 ['+eName+'] \u9020\u6210 '+dmg+' \u70b9\u4f24\u5bb3','log-crit');
    }else{
      addLog('['+actorName+'] \u4f7f\u7528 '+sk.name+' \u5bf9 ['+eName+'] \u9020\u6210 '+dmg+' \u70b9\u4f24\u5bb3');
    }
    if(target.hp<=0){
      addLog('['+eName+'] \u88ab\u51fb\u8d25\uff01','log-victory');
    }
  }

  updateEnemyUI();
  renderCharCardList();
  saveGame();

  const stillAlive=getAliveEnemies();
  if(stillAlive.length===0){
    let totalQi=0,totalExp=0;
    const defeatedNames=[];
    for(const e of combatData.enemies){
      if(e===null)continue;
      totalQi+=e.template.dropQi;
      totalExp+=e.template.dropExp;
      defeatedNames.push(enemySlotName(combatData.enemies.indexOf(e)));
    }
    addLog('\u6218\u6597\u80dc\u5229\uff01\u51fb\u8d25 '+defeatedNames.join('\u3001')+'\uff0c\u83b7\u5f97 '+totalQi+' \u7075\u529b\u3001'+totalExp+' \u7ecf\u9a8c','log-victory');
    addLog('\u2014\u2014\u2014\u2014\u2014\u2014\u2014\u2014\u2014\u2014\u2014\u2014\u2014\u2014','log-info');
    player.lingshi+=totalQi;
    player.qi+=totalQi;
    player.exp+=totalExp;
    // Track bestiary kills
    for(const e of combatData.enemies){if(e!==null&&e.template)trackBestiaryKill(e.template.id);}
    checkLayerUp();
    endCombat(true);
  }
}

// ==================== RIGHT PANEL ====================
let activePanel=null;
function switchPanel(panelId,btn){
  const combatView=document.getElementById('combatView');
  const centerPanel=document.getElementById('centerPanel');

  // If clicking already-active panel, exit panel mode
  if(activePanel===panelId && centerPanel.style.display!=='none'){
    closePanel();
    return;
  }

  // Combat check
  if(gameState.inCombat){
    addLog('战斗中无法切换面板','log-info');
    return;
  }

  // Update button states
  document.querySelectorAll('.right-panel .menu-btn').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
  activePanel=panelId;

  // Hide combat, show panel
  combatView.style.display='none';
  centerPanel.style.display='flex';
  centerPanel.style.flexDirection='column';

  // Render panel content
  switch(panelId){
    case 'skill': renderSkillPanel(); break;
    case 'bag': renderBagPanel(); break;
    case 'partner': renderPartnerPanel(); break;
    case 'shop': renderShopPanel(); break;
    case 'quest': renderQuestPanel(); break;
    case 'rebirth': renderRebirthPanel(); break;
    case 'cave': renderCavePanel(); break;
    case 'beast': renderBeastPanel(); break;
    case 'achieve': renderAchievePanel(); break;
    case 'treasure': renderTreasurePanel(); break;
    case 'costume': renderCostumePanel(); break;
    case 'exploreMap': renderExploreMapPanel(); break;
    case 'alchemy': renderAlchemyPanel(); break;
    case 'forge': renderForgePanel(); break;
            case 'runes': renderRunePanel(); break;
        case 'sect': renderSectPanel(); break;
        case 'bestiary': renderBestiaryPanel(); break;
        case 'fishing': renderFishingPanel(); break;
        case 'tower': renderTowerPanel(); break;
        case 'bossrush': renderBossRushPanel(); break;
      case 'treasure': renderTreasurePanel(); break;
  }
}

function closePanel(){
  document.getElementById('combatView').style.display='flex';
  document.getElementById('centerPanel').style.display='none';
  activePanel=null;
  document.querySelectorAll('.right-panel .menu-btn').forEach(b=>b.classList.remove('active'));
}

function craftPill(recipeId){
  const r=DAN_RECIPES.find(x=>x.id===recipeId);
  if(!r)return;
  if(player.cave.alchemyRoom<r.reqAlchemyLv){addLog('炼丹房等级不足，需要Lv.'+r.reqAlchemyLv,'log-info');return}
  if(player.caveResources.herbs<r.costHerbs){addLog('药材不足','log-info');return}
  if(player.lingshi<r.costLingshi){addLog('灵石不足','log-info');return}
  player.caveResources.herbs-=r.costHerbs;
  player.lingshi-=r.costLingshi;

  switch(r.effect){
    case 'maxHp': case 'maxQi': case 'atk': case 'def':

      player.permaPillStats[r.effect]=(player.permaPillStats[r.effect]||0)+r.value;

      if(!player.permaPillStats)player.permaPillStats={maxHp:0,maxQi:0,atk:0,def:0,crit:0};if(!player.runes)player.runes={weapon:[],armor:[],accessory:[],inventory:[]};if(!player.equippedRunes)player.equippedRunes=[{},{},{}];if(!player.sect)player.sect=null;if(!player.sectTasks)player.sectTasks=[];if(!player.sectTaskProgress)player.sectTaskProgress={};if(!player.sectShopInventory)player.sectShopInventory=[];if(!player.bestiary)player.bestiary={kills:{},bonuses:[]};if(!player.fishing)player.fishing={rod:0,caught:{},lastFish:0};if(!player.tower)player.tower={floor:1,maxFloor:1,dailyReward:0};player.runes={weapon:[],armor:[],accessory:[],inventory:[]};player.equippedRunes=[{},{},{}];player.sect=null;player.sectTasks=[];player.sectTaskProgress={};player.sectShopInventory=[];player.bestiary={kills:{},bonuses:[]};player.fishing={rod:0,caught:{},lastFish:0};player.tower={floor:1,maxFloor:1,dailyReward:0};
      player.critRate+=r.value;
      player.permaPillStats.crit=(player.permaPillStats.crit||0)+r.value;
      break;
    case 'instantHeal':
      combatData.playerHp=Math.min(maxHp(),combatData.playerHp+maxHp()*r.value);

  }

function forgeItem(recipeId){
  const r=FORGE_RECIPES.find(x=>x.id===recipeId);
  if(!r)return;
  if(player.cave.forgeRoom<r.reqForgeLv){addLog('炼器室等级不足，需要Lv.'+r.reqForgeLv,'log-info');return}
  if(player.caveResources.ores<r.costOres){addLog('矿石不足','log-info');return}
  if(player.lingshi<r.costLingshi){addLog('灵石不足','log-info');return}
  player.caveResources.ores-=r.costOres;
  player.lingshi-=r.costLingshi;

  if(r.type==='enhanceStone'){
    if(!player.enchantMaterials)player.enchantMaterials={};
    player.enchantMaterials.spiritStone=(player.enchantMaterials.spiritStone||0)+1;
    addLog('🔨 锻造成功：强化石 x1！','log-victory');
  }else{
    const eq=getRandomEquip(r.type,r.minStars,r.maxStars);
    if(player.inventory.length>=(player.inventorySize||30)){
      addLog('背包已满，无法放入新装备','log-info');
      // refund half
      player.caveResources.ores+=Math.floor(r.costOres/2);
      player.lingshi+=Math.floor(r.costLingshi/2);
      return;
    }
    player.inventory.push(eq);
    autoEquip();
    addLog('🔨 锻造成功：'+eq.name+' ('+eq.quality+') ！','log-victory');
  }
  updateAllUI();
  renderForgePanel();
  saveGame();
}

// ==================== BEAST PANEL (ENHANCED) ====================
function checkBeastLevelUp(beastId){
  const sb=player.spiritBeasts.find(x=>x.id===beastId);
  if(!sb)return;
  const exp=player.beastExp[beastId]||0;
  const maxLv=30;
  if(sb.level>=maxLv)return;
  const expNeeded=sb.level*20+50;
  if(exp>=expNeeded){
    sb.level++;
    player.beastExp[beastId]-=expNeeded;
    const b=BEASTS.find(x=>x.id===beastId);
    if(b)addLog('🐾 '+b.name+' 升级至 Lv.'+sb.level+'！','log-victory');
    checkTitleUnlocks();
    saveGame();
    if(sb.level>=10&&sb.evolution===0&&b&&b.evolutions){
      addLog('🐾 '+b.name+' 可以进化了！前往灵兽面板查看','log-info');
    }
    if(sb.level>=20&&sb.evolution===1&&b&&b.evolutions&&b.evolutions.length>=2){
      addLog('🐾 '+b.name+' 可以二次进化了！','log-info');
    }
    if(sb.level>=30&&sb.evolution===2&&b&&b.evolutions&&b.evolutions.length>=3){
      addLog('🐾 '+b.name+' 可以终极进化了！','log-info');
    }
  }
}

function evolveBeast(beastId){
  const sb=player.spiritBeasts.find(x=>x.id===beastId);
  if(!sb)return;
  const b=BEASTS.find(x=>x.id===beastId);
  if(!b||!b.evolutions)return;
  const nextEvo=b.evolutions[sb.evolution];
  if(!nextEvo){addLog('已达最高进化等级','log-info');return}
  if(sb.level<nextEvo.requiredLv){addLog('需要等级达到'+nextEvo.requiredLv+'级才能进化','log-info');return}
  const cost=BEAST_EVOLVE_COST[sb.evolution+1]||10000;
  if(player.lingshi<cost){addLog('进化需要'+cost+'灵石','log-info');return}
  player.lingshi-=cost;
  sb.evolution++;
  addLog('✨ '+b.name+' 进化成功 → '+nextEvo.name+'！','log-victory');
  updateAllUI();
  renderBeastPanel();
  saveGame();
}

function feedBeast(beastId){
  if(!player.enchantMaterials)player.enchantMaterials={};
  if(!player.enchantMaterials.beastFood||player.enchantMaterials.beastFood<1){
    addLog('灵兽口粮不足（探索秘境稀有掉落获得）','log-info');return;
  }
  player.enchantMaterials.beastFood--;
  const expGain=50+Math.floor(Math.random()*30);
  player.beastExp[beastId]=(player.beastExp[beastId]||0)+expGain;
  const b=BEASTS.find(x=>x.id===beastId);
  addLog('🍖 喂食 '+b.name+'，获得 '+expGain+' 经验','log-info');
  checkBeastLevelUp(beastId);
  renderBeastPanel();
  saveGame();
}

function equipPartner(partnerId){
  if(player.activeTeam.includes(partnerId))return;
  const emptyIdx=player.activeTeam.findIndex(x=>!x);
  if(emptyIdx===-1&&player.activeTeam.length>=4)return;
  if(emptyIdx>=0){
    player.activeTeam[emptyIdx]=partnerId;
  }else{
    player.activeTeam.push(partnerId);
  }
  if(activePanel==='partner')renderPartnerPanel();
  renderCharCardList();
  saveGame();
}

function unequipPartner(partnerId){
  const idx=player.activeTeam.indexOf(partnerId);
  if(idx>=0)player.activeTeam[idx]=null;
  while(player.activeTeam.length>0&&!player.activeTeam[player.activeTeam.length-1])player.activeTeam.pop();
  if(activePanel==='partner')renderPartnerPanel();
  renderCharCardList();
  saveGame();
}

let questFilter='main';
function renderQuestPanel(){
  const panel=document.getElementById('centerPanel');
  if(!panel||panel.style.display==='none')return;
  autoAcceptQuests();
  let html='<div class="card-title">任务</div>';
  html+='<div class="panel-bag-tabs">';
  const tabs=['main','side'];
  for(const t of tabs){
    const label=t==='main'?'主线':'支线';
    const active=t===questFilter?'style="background:#C9A96E;color:#FFF"':'style="background:#FAFAFA;color:#666"';
    html+='<button class="skill-tab" '+active+' onclick="questFilter=\''+t+'\';renderQuestPanel()">'+label+'</button>';
  }
  html+='</div>';

  const filtered=QUESTS.filter(q=>q.type===questFilter);
  if(filtered.length===0){
    html+='<div style="display:flex;align-items:center;justify-content:center;flex:1;color:#BBB;font-size:16px">暂无任务</div>';
  }else{
    html+='<div style="overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:10px">';
    for(const q of filtered){
      const completed=player.completedQuests.includes(q.id);
      const active=player.activeQuests.includes(q.id);
      const unlocked=player.realmIndex>=q.unlockRealm;
      const progress=player.questProgress[q.id]||0;
      const targetCount=q.target.count;
      const pct=Math.min(100,progress/targetCount*100);

      html+='<div style="background:#FAFAFA;border-radius:10px;padding:12px;border-left:4px solid '+(completed?'#2ECC71':(active?'#C9A96E':'#CCC'))+'">';
      html+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">';
      html+='<span style="font-size:14px;font-weight:700;color:#333">'+q.name+'</span>';
      if(completed){
        html+='<span style="font-size:11px;color:#2ECC71;font-weight:700">已完成</span>';
      }else if(!unlocked){
        html+='<span style="font-size:11px;color:#E74C3C">需'+REALMS[q.unlockRealm].name+'期解锁</span>';
      }
      html+='</div>';
      html+='<div style="font-size:12px;color:#888;margin-bottom:6px">'+q.desc+'</div>';
      if(active&&!completed){
        html+='<div style="height:8px;background:#E8E8E8;border-radius:4px;overflow:hidden;margin-bottom:6px"><div style="height:100%;background:linear-gradient(90deg,#C9A96E,#B8944A);border-radius:4px;width:'+pct+'%;transition:width 0.3s"></div></div>';
        html+='<div style="font-size:10px;color:#888;margin-bottom:6px">进度: '+progress+'/'+targetCount+'</div>';
      }
      html+='<div style="font-size:10px;color:#888">奖励: '+(q.reward.lingshi?q.reward.lingshi+'灵石':'')+(q.reward.exp?' +'+q.reward.exp+'经验':'')+(q.reward.equipment?' +装备:'+q.reward.equipment:'')+'</div>';
      html+='</div>';
    }
    html+='</div>';
  }
  panel.innerHTML=html;
}

function autoAcceptQuests(){
  for(const q of QUESTS){
    if(player.completedQuests.includes(q.id))continue;
    if(player.activeQuests.includes(q.id))continue;
    if(player.realmIndex>=q.unlockRealm){
      player.activeQuests.push(q.id);
      if(!player.questProgress[q.id])player.questProgress[q.id]=0;
    }
  }
}

function updateQuestProgress(type,enemyName,increment){
  for(const qid of player.activeQuests){
    const q=QUESTS.find(x=>x.id===qid);
    if(!q||player.completedQuests.includes(qid))continue;
    let matched=false;
    if(q.target.type===type){
      if(type==='kill'){
        if(q.target.enemy===enemyName||q.target.enemy==='any')matched=true;
      }else if(type==='total_kill'){
        matched=true;
      }
    }
    if(matched){
      if(type==='total_kill'){
        player.questProgress[qid]=player.totalKills;
      }else{
        player.questProgress[qid]=(player.questProgress[qid]||0)+increment;
      }
    }
  }
}

function checkAllQuests(){
  autoAcceptQuests();
  for(const qid of [...player.activeQuests]){
    const q=QUESTS.find(x=>x.id===qid);
    if(!q||player.completedQuests.includes(qid))continue;
    let curProgress=player.questProgress[qid]||0;
    // Update progress for non-event-driven types
    switch(q.target.type){
      case 'lingshi': curProgress=player.lingshi; break;
      case 'layer': curProgress=player.layer; break;
      case 'realm': curProgress=player.realmIndex; break;
      case 'equip_count': curProgress=Object.values(player.equipment).filter(Boolean).length; break;
      case 'skill_equipped': curProgress=player.equippedSkills.filter(Boolean).length; break;
      case 'partner_count': curProgress=player.partners.length; break;
      case 'explore_count': curProgress=player.totalExplores; break;
      case 'total_kill': curProgress=player.totalKills; break;
    }
    player.questProgress[qid]=curProgress;

    if(curProgress>=q.target.count){
      // Quest complete!
      player.completedQuests.push(qid);
      player.activeQuests=player.activeQuests.filter(x=>x!==qid);
      // Grant rewards
      if(q.reward.lingshi)player.lingshi+=q.reward.lingshi;
      if(q.reward.exp)player.exp+=q.reward.exp;
      if(q.reward.equipment){
        const eq=EQUIPMENT_POOL.find(e=>e.id===q.reward.equipment);
        if(eq){player.inventory.push({...eq,type:'equipment'});autoEquip();}
      }
      addLog('✅ 任务完成：'+q.name+'！获得'+
        (q.reward.lingshi?q.reward.lingshi+'灵石':'')+
        (q.reward.exp?(q.reward.lingshi?'、':'')+q.reward.exp+'经验':'')+
        (q.reward.equipment?(q.reward.lingshi||q.reward.exp?'、':'')+'装备:'+q.reward.equipment:'')
      ,'log-victory');
    }
  }
}

function recruitPartner(type){
  const cost=type==='premium'?500:200;
  if(player.lingshi<cost){
    document.getElementById('shopResult').innerHTML='<div class="shop-result" style="color:#E74C3C">灵石不足！</div>';
    return;
  }
  player.lingshi-=cost;

  // Determine pool
  const normalPool=PARTNER_POOL.filter(p=>p.quality==='凡品'||p.quality==='灵品');
  const premiumPool=PARTNER_POOL.filter(p=>p.quality==='地品'||p.quality==='天品');
  const premiumChance=type==='premium'?0.5:0.2;
  let pool;
  if(Math.random()<premiumChance){pool=premiumPool}else{pool=normalPool}
  const partner=pool[Math.floor(Math.random()*pool.length)];

  // Animate
  document.getElementById('shopResult').innerHTML='<div class="shop-result">招募中...</div>';

  setTimeout(()=>{
    const existing=player.partners.find(p=>p.id===partner.id);
    if(existing){
      const refund=type==='premium'?200:50;
      player.lingshi+=refund;
      const qColor=QUALITY_COLORS[partner.quality]||'#CCC';
      document.getElementById('shopResult').innerHTML='<div class="shop-result" style="color:'+qColor+'">重复伙伴 ['+partner.name+'] → 转化 '+refund+' 灵石</div>';
    }else if(player.partners.length>=20){
      document.getElementById('shopResult').innerHTML='<div class="shop-result" style="color:#E74C3C">伙伴已满（最多20个）</div>';
    }else{
      const newPartner={...partner,level:1};
      player.partners.push(newPartner);
      const qColor=QUALITY_COLORS[partner.quality]||'#CCC';
      document.getElementById('shopResult').innerHTML='<div class="shop-result" style="color:'+qColor+'">获得 ['+partner.quality+'] '+partner.name+'！</div>';
    }
    updateAllUI();
    saveGame();
    checkAllQuests();
  },600);
}

// ==================== MANUAL FRAGMENTS & LINEAGE ====================
function synthesizeManual(manualId){
  const m=MANUALS.find(x=>x.id===manualId);
  if(!m)return;
  if(!player.manualFragments)player.manualFragments={};
  const have=player.manualFragments[manualId]||0;
  if(have<m.fragments){addLog('残卷不足，需要'+m.fragments+'片（当前'+have+'片）','log-info');return}
  player.manualFragments[manualId]=0;
  if(!player.activeManuals.includes(manualId))player.activeManuals.push(manualId);
  addLog('📖 合成成功！'+m.name+' 已加入修炼队列','log-victory');
  renderSkillPanel();
  saveGame();
}

function getManualFragmentProgress(manualId){
  if(!player.manualFragments)return '';
  const m=MANUALS.find(x=>x.id===manualId);
  if(!m)return '';
  const have=player.manualFragments[manualId]||0;
  if(player.completedManuals.includes(manualId))return '<span class="fragment-badge" style="background:#E8F5E9;color:#2E7D32">已圆满</span>';
  if(player.activeManuals.includes(manualId))return '<span class="fragment-badge">修炼中 ('+have+'/'+m.fragments+')</span>';
  if(have>=m.fragments)return '<span class="fragment-badge" style="background:#FFF3E0;color:#E65100">可合成 ('+have+'/'+m.fragments+')</span>';
  return '<span class="fragment-badge">'+have+'/'+m.fragments+'</span>';
}

// ==================== EQUIPMENT REFINE (品质精炼) ====================
function refineEquipment(slot){
  const eq=player.equipment[slot];
  if(!eq){addLog('该槽位没有装备','log-info');return}
  const qualityOrder=['凡品','灵品','地品','天品','仙品','神品'];
  const idx=qualityOrder.indexOf(eq.quality);
  if(idx>=qualityOrder.length-1){addLog('装备已达最高品质','log-info');return}
  if(!player.enchantMaterials)player.enchantMaterials={};
  const equipShards=player.enchantMaterials.equipShards||0;
  if(equipShards<5){addLog('需要5个装备碎片（当前'+equipShards+'个，通过探索秘境获得）','log-info');return}
  const cost=(idx+1)*1000;
  if(player.lingshi<cost){addLog('需要'+cost+'灵石','log-info');return}
  player.lingshi-=cost;
  player.enchantMaterials.equipShards-=5;
  const rates=[0.8,0.6,0.4,0.2,0.1];
  if(Math.random()<rates[idx]){
    eq.quality=qualityOrder[idx+1];
    addLog('✨ 精炼成功！'+eq.name+' 晋升为 ['+eq.quality+']','log-victory');
  }else{
    addLog('精炼失败... 材料已消耗，品质未变','log-defeat');
  }
  updateAllUI();
  saveGame();
}

// ==================== EQUIPMENT ENCHANT (附魔) ====================
function enchantEquipment(slot, stat){
  const eq=player.equipment[slot];
  if(!eq){addLog('该槽位没有装备','log-info');return}
  if(!eq.enchants)eq.enchants=[];
  if(eq.enchants.length>=3){addLog('该装备已有3条附魔','log-info');return}
  if(eq.enchants.some(e=>e.stat===stat)){addLog('该属性已有附魔','log-info');return}
  if(!player.enchantMaterials)player.enchantMaterials={};
  const stones=player.enchantMaterials.enchantStones||0;
  if(stones<3){addLog('需要3个附魔石（当前'+stones+'个）','log-info');return}
  player.enchantMaterials.enchantStones-=3;
  const statNames={atk:'攻击',def:'防御',hp:'生命',crit:'暴击',dodge:'闪避'};
  const statValues={atk:Math.floor(5+Math.random()*15),def:Math.floor(3+Math.random()*10),hp:Math.floor(20+Math.random()*50),crit:Math.floor(1+Math.random()*4),dodge:Math.floor(1+Math.random()*3)};

// ==================== SPIRIT CRYSTAL SOCKET (灵晶镶嵌) ====================
function socketCrystal(slot, crystalType){
  const eq=player.equipment[slot];
  if(!eq){addLog('该槽位没有装备','log-info');return}
  if(!eq.crystals)eq.crystals=[];
  if(eq.crystals.length>=2){addLog('该装备灵晶槽已满（最多2个）','log-info');return}
  if(!player.spiritCrystals)player.spiritCrystals={};
  const have=player.spiritCrystals[crystalType]||0;
  if(have<1){addLog('灵晶不足','log-info');return}
  player.spiritCrystals[crystalType]--;
  eq.crystals.push(crystalType);
  const crystalNames={atk:'攻击灵晶(+5攻)',def:'防御灵晶(+3防)',hp:'生命灵晶(+30血)',crit:'暴击灵晶(+2%暴击)'};
  addLog('💎 镶嵌成功！'+eq.name+' '+crystalNames[crystalType],'log-victory');
  updateAllUI();
  saveGame();
}

function getCrystalBonus(slot, stat){
  const eq=player.equipment[slot];
  if(!eq||!eq.crystals)return 0;
  let bonus=0;
  for(const ct of eq.crystals){
    if(ct==='atk'&&stat==='atk')bonus+=5;
    if(ct==='def'&&stat==='def')bonus+=3;
    if(ct==='hp'&&stat==='hp')bonus+=30;
    if(ct==='crit'&&stat==='crit')bonus+=2;
  }
  return bonus;
}

function getEnchantBonus(slot, stat){
  const eq=player.equipment[slot];
  if(!eq||!eq.enchants)return 0;
  let bonus=0;
  for(const enc of eq.enchants){
    if(enc.stat===stat)bonus+=enc.value;
  }
  return bonus;
}

  for(const set of SETS){

// ==================== TREASURE UPGRADE & EVOLUTION ====================
function upgradeTreasure(treasureId){
  const idx=player.treasures.findIndex(t=>{
    const tid=typeof t==='string'?t:t.id;
    return tid===treasureId;
  });
  if(idx===-1)return;
  if(typeof player.treasures[idx]==='string'){
    player.treasures[idx]={id:player.treasures[idx],level:1,exp:0,evolution:0};
  }
  const trObj=player.treasures[idx];
  if(trObj.level>=30){addLog('法宝已达最高等级','log-info');return}
  const cost=trObj.level*500;
  if(player.lingshi<cost){addLog('升级需要'+cost+'灵石','log-info');return}
  player.lingshi-=cost;
  trObj.level++;
  trObj.exp+=10;
  const t=TREASURES.find(x=>x.id===treasureId);
  addLog('🌟 '+t.name+' 升级至 Lv.'+trObj.level+'！','log-victory');
  if(trObj.level===5)addLog(t.name+' 解锁新效果：攻击间隔缩减！','log-victory');
  if(trObj.level===10)addLog(t.name+' 解锁新效果：伤害翻倍！','log-victory');
  if(trObj.level===15)addLog(t.name+' 解锁新效果：效果范围扩大！','log-victory');
  if(trObj.level===20)addLog(t.name+' 解锁新效果：额外加成！','log-victory');
  if(trObj.level===25)addLog(t.name+' 解锁新效果：终极强化！','log-victory');
  if(trObj.level===30)addLog(t.name+' 已达满级，威能无穷！','log-victory');
  renderTreasurePanel();
  saveGame();
}

function evolveTreasure(treasureId){
  const idx=player.treasures.findIndex(t=>{
    const tid=typeof t==='string'?t:t.id;
    return tid===treasureId;
  });
  if(idx===-1)return;
  if(typeof player.treasures[idx]==='string'){
    player.treasures[idx]={id:player.treasures[idx],level:1,exp:0,evolution:0};
  }
  const trObj=player.treasures[idx];
  if(trObj.level<10){addLog('法宝需要达到10级才能进化（当前'+trObj.level+'级）','log-info');return}
  if(trObj.evolution>=3){addLog('法宝已达最高进化等级','log-info');return}
  if(!player.enchantMaterials)player.enchantMaterials={};
  const essence=player.enchantMaterials.celestialEssence||0;
  const needEssence=trObj.evolution+1;
  if(essence<needEssence){addLog('需要'+needEssence+'个星辰精华（当前'+essence+'个，探索秘境稀有获得）','log-info');return}
  player.enchantMaterials.celestialEssence-=needEssence;
  trObj.evolution++;
  trObj.level=1;
  const t=TREASURES.find(x=>x.id===treasureId);
  const evoNames=['灵','仙','神'];
  const baseName=t.name.replace(/[灵仙神]/g,'');
  const newName=evoNames[trObj.evolution-1]+baseName;
  addLog('🔥 '+t.name+' 进化为 '+newName+'（'+trObj.evolution+'阶）！属性大幅提升！','log-victory');
  renderTreasurePanel();
  saveGame();
}

function devourTreasure(targetId, foodId){
  const targetIdx=player.treasures.findIndex(t=>{
    const tid=typeof t==='string'?t:t.id;
    return tid===targetId;
  });
  const foodIdx=player.treasures.findIndex(t=>{
    const tid=typeof t==='string'?t:t.id;
    return tid===foodId;
  });
  if(targetIdx===-1||foodIdx===-1)return;
  if(targetIdx===foodIdx){addLog('不能吞噬自己','log-info');return}
  if(typeof player.treasures[targetIdx]==='string')player.treasures[targetIdx]={id:player.treasures[targetIdx],level:1,exp:0,evolution:0};
  if(typeof player.treasures[foodIdx]==='string')player.treasures[foodIdx]={id:player.treasures[foodIdx],level:1,exp:0,evolution:0};
  const target=player.treasures[targetIdx];
  const food=player.treasures[foodIdx];
  target.exp+=Math.floor(food.exp*0.5);
  while(target.exp>=10&&target.level<30){target.exp-=10;target.level++}
  const tName=TREASURES.find(x=>x.id===targetId)?.name||targetId;
  const fName=TREASURES.find(x=>x.id===foodId)?.name||foodId;
  addLog('⚔ '+tName+' 吞噬了 '+fName+'，获得经验！Lv.'+target.level,'log-victory');
  if(player.activeTreasures.includes(foodId)){
    player.activeTreasures=player.activeTreasures.filter(t=>t!==foodId);
  }
  player.treasures.splice(foodIdx,1);
  renderTreasurePanel();
  saveGame();
}

function showDevourTargets(targetId){

  });

  html+='<div style="overflow-y:auto;flex:1">';

function equipTreasure(treasureId){
  if(!player.activeTreasures)player.activeTreasures=[];
  if((player.activeTreasures||[]).filter(Boolean).length>=2)return;
  player.activeTreasures.push(treasureId);
  renderTreasurePanel();

}

function unequipTreasure(idx){
  if(!player.activeTreasures)return;
  player.activeTreasures.splice(idx,1);

  saveGame();
}

// ==================== EQUIPMENT ENHANCE ====================
function enhanceEquipment(slot){
  const eq=player.equipment[slot];
  if(!eq){addLog('该槽位没有装备','log-info');return}
  if(eq.enhanceLevel===undefined)eq.enhanceLevel=0;
  const lv=eq.enhanceLevel;
  if(lv>=15){addLog('装备已达最高强化等级','log-info');return}
  const cost=100+lv*50;
  if(player.lingshi<cost){addLog('强化需要'+cost+'灵石，灵石不足','log-info');return}
  player.lingshi-=cost;
  let successRate;
  if(lv<5)successRate=1.0;
  else if(lv<10)successRate=0.7;
  else if(lv<14)successRate=0.4;
  else successRate=0.2;
  if(Math.random()<successRate){
    eq.enhanceLevel=lv+1;
    addLog('⚒ 强化成功！'+eq.name+' → +'+eq.enhanceLevel,'log-victory');
  }else{
    if(lv>0)eq.enhanceLevel=lv-1;
    addLog('⚒ 强化失败... '+eq.name+' → +'+eq.enhanceLevel,'log-defeat');
  }
  updateAllUI();
  saveGame();
}

// ==================== EQUIPMENT ENHANCED TOTAL ====================
function equipEnhancedTotal(stat){
  let sum=0;
  const slots=['weapon','armor','accessory'];
  for(const s of slots){
    if(player.equipment[s]){
      const base=player.equipment[s][stat]||0;
      const elv=player.equipment[s].enhanceLevel||0;
      sum+=Math.floor(base*(1+elv*0.1));
    }
  }
  return sum;
}

function startBossRush(){
  closePanel();
  if(!player.bossRush)player.bossRush={unlocked:false,record:0,active:false,wave:0,wins:0,buffs:{},rushHp:0};
  player.bossRush.active=true;
  player.bossRush.wave=0;
  player.bossRush.wins=0;
  player.bossRush.buffs={atk:0,def:0,crit:0};
  player.bossRush.rushHp=maxHp();
  addLog('⚔ Boss连战开始！迎战第1波Boss...','log-victory');
  startBossRushWave();
}

function startBossRushWave(){
  const boss=generateBossRushBoss(player.bossRush.wave);
  combatData.enemies=[boss,null,null];
  combatData.currentTarget=0;
  combatData.playerHp=player.bossRush.rushHp;
  combatData.logCount=0;
  combatData.playerLastAttack=Date.now();
  combatData.partnerLastAttack={};
  combatData.partnerHps={};
  const activePartners=getActivePartners();
  for(const p of activePartners){
    combatData.partnerHps[p.id]=p.baseHp;
    combatData.partnerLastAttack[p.id]=Date.now();
  }
  boss.lastAttack=Date.now();
  boss.attackInterval=2.5+Math.random();

  updateEnemyUI();
  gameState.inCombat=true;
  player.skillCooldowns={};player.defBuff=0;
  for(const p of activePartners){p.skillCooldowns={};}
  document.getElementById('btnFight').textContent='连战中...';
  document.getElementById('btnFight').style.opacity='0.6';
  if(combatData.tickIntervalId){clearInterval(combatData.tickIntervalId);}
  combatData.tickIntervalId=setInterval(combatTick,100);
}

function onBossRushWaveClear(){
  player.bossRush.wins++;
  player.bossRush.rushHp=combatData.playerHp;
  player.totalKills++;

  if(player.bossRush.wave>=BOSS_RUSH_CONFIG.totalWaves-1){
    // All waves cleared!
    const bonusLingshi=5000+player.bossRush.wins*1000;
    const bonusExp=3000+player.bossRush.wins*500;
    player.lingshi+=bonusLingshi;
    player.exp+=bonusExp;
    player.skillPoints=(player.skillPoints||0)+5;
    const oldRecord=player.bossRush.record||0;
    if(player.bossRush.wins>oldRecord)player.bossRush.record=player.bossRush.wins;
    player.bossRush.active=false;
    addLog('🏆 Boss连战通关！全部'+BOSS_RUSH_CONFIG.totalWaves+'波Boss击败！','log-victory');
    addLog('获得奖励：灵石+'+bonusLingshi+' 经验+'+bonusExp+' 技能点+5','log-victory');
    // 10% chance rare equipment
    if(Math.random()<0.3){
      const eq=getRandomEquip('weapon',3,5);
      player.inventory.push(eq);
      addLog('[额外] '+eq.name+' ('+eq.quality+')','log-victory');
      autoEquip();
    }
    checkLayerUp();
    checkAchievements();
    updateAllUI();
    saveGame();
    return;
  }

  // Show reward picker
  showBossRushRewardPicker();
}

function showBossRushRewardPicker(){
  const overlay=document.createElement('div');
  overlay.id='bossRushOverlay';
  overlay.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:1000;display:flex;align-items:center;justify-content:center';

  const picks=BOSS_RUSH_REWARDS.sort(()=>Math.random()-0.5).slice(0,3);

  let inner='<div style="background:#FFFEF5;border:3px solid #FF9800;border-radius:16px;padding:24px;max-width:500px;width:90%;text-align:center">';
  inner+='<div style="font-size:22px;font-weight:700;color:#E65100;margin-bottom:6px">选择奖励</div>';
  inner+='<div style="font-size:13px;color:#999;margin-bottom:16px">第'+(player.bossRush.wave+1)+'波已通过，选择一个加成进入下一波</div>';
  inner+='<div style="display:flex;gap:10px">';
  for(const r of picks){
    inner+='<div style="flex:1;background:#FAFAFA;border:2px solid #E0E0E0;border-radius:10px;padding:12px;cursor:pointer" onclick="pickBossRushReward(\''+r.id+'\')">';
    inner+='<div style="font-size:30px">'+r.icon+'</div>';
    inner+='<div style="font-size:13px;font-weight:600;color:#333;margin-top:4px">'+r.name+'</div>';
    inner+='<div style="font-size:10px;color:#888;margin-top:2px">'+r.desc+'</div>';
    inner+='</div>';
  }
  inner+='</div></div>';

  overlay.innerHTML=inner;
  document.body.appendChild(overlay);
}

function pickBossRushReward(rewardId){
  const overlay=document.getElementById('bossRushOverlay');
  if(overlay)overlay.remove();

  const r=BOSS_RUSH_REWARDS.find(x=>x.id===rewardId);
  if(!r)return;

  switch(r.effect){
    case 'heal50':
      combatData.playerHp=Math.min(maxHp(),combatData.playerHp+maxHp()*0.5);
      addLog('💚 生命恢复50%！','log-victory');
      break;
    case 'atkBuff':
      player.bossRush.buffs.atk=(player.bossRush.buffs.atk||0)+r.value;
      addLog('⚔ 攻击力+25%（本场）！','log-victory');
      break;
    case 'defBuff':
      player.bossRush.buffs.def=(player.bossRush.buffs.def||0)+r.value;
      addLog('🛡 防御力+40%（本场）！','log-victory');
      break;
    case 'lingshiGain':
      player.lingshi+=r.value;
      addLog('💰 获得'+r.value+'灵石！','log-victory');
      break;
    case 'fullHeal':
      combatData.playerHp=maxHp();
      player.qi=maxQi();
      addLog('💖 完全恢复！','log-victory');
      break;
    case 'critBuff':
      player.bossRush.buffs.crit=(player.bossRush.buffs.crit||0)+r.value;
      addLog('🎯 暴击率+15%（本场）！','log-victory');
      break;
  }

  player.bossRush.rushHp=combatData.playerHp;
  player.bossRush.wave++;
  addLog('⚔ 第'+(player.bossRush.wave+1)+'波Boss即将到来...','log-info');
  startBossRushWave();
}

function cancelBossRush(){
  if(!confirm('确定要放弃Boss连战吗？已获得的奖励会保留。'))return;
  if(combatData.tickIntervalId){clearInterval(combatData.tickIntervalId);combatData.tickIntervalId=null}
  gameState.inCombat=false;
  const wins=player.bossRush.wins;
  const bonusLingshi=wins*300;
  const bonusExp=wins*200;
  player.lingshi+=bonusLingshi;
  player.exp+=bonusExp;
  const oldRecord=player.bossRush.record||0;
  if(wins>oldRecord)player.bossRush.record=wins;
  player.bossRush.active=false;
  player.bossRush.wave=0;player.bossRush.buffs={};
  combatData.enemies=[null,null,null];combatData.currentTarget=0;
  addLog('Boss连战放弃，已击败'+wins+'波。获得灵石+'+bonusLingshi+' 经验+'+bonusExp,'log-info');
  document.getElementById('btnFight').textContent='开始战斗';
  document.getElementById('btnFight').style.opacity='1';
  updateEnemyUI();
  updateAllUI();
  saveGame();
}

// ==================== RUNE PANEL ====================
function renderRunePanel(){
  const panel=document.getElementById('centerPanel');
  if(!panel||panel.style.display==='none')return;
  if(!player.runes)player.runes={weapon:[],armor:[],accessory:[],inventory:[]};

  let html='<div class="card-title">符文铭刻</div>';

  // Equipment rune slots
  const slots=[{key:'weapon',label:'武器',eq:player.equipment.weapon},{key:'armor',label:'防具',eq:player.equipment.armor},{key:'accessory',label:'饰品',eq:player.equipment.accessory}];
  html+='<div style="display:flex;gap:10px;margin-bottom:12px">';
  for(const s of slots){
    const slRunes=player.runes[s.key]||[];
    html+='<div style="flex:1;background:#FAFAFA;border:2px solid #E0E0E0;border-radius:10px;padding:10px;text-align:center">';
    html+='<div style="font-size:13px;font-weight:700;color:#666;margin-bottom:6px">'+s.label+'</div>';
    if(!s.eq){html+='<div style="font-size:11px;color:#CCC">未装备</div>';}
    else{
      for(let i=0;i<2;i++){
        const r=slRunes[i];
        if(r){
          const qColor=RUNE_QUALITY.indexOf(r.quality)>=0?['#AAA','#4CAF50','#9C27B0','#FF9800'][r.qualityIdx||0]:'#CCC';
          html+='<div style="background:#FFF;padding:4px 8px;border-radius:4px;margin:2px 0;font-size:11px;border-left:3px solid '+qColor+'">'+r.icon+' '+r.name+' <span style="color:'+qColor+'">'+r.value+'%</span><button style="margin-left:4px;color:#E74C3C;cursor:pointer;border:none;background:none;font-size:11px" onclick="unequipRune(\''+s.key+'\','+i+')">×</button></div>';
        }else{
          html+='<div style="font-size:10px;color:#CCC;padding:6px 0">空槽位</div>';
        }
      }
    }
    html+='</div>';
  }
  html+='</div>';

  // Rune inventory
  html+='<div style="font-size:14px;font-weight:700;color:#C9A96E;margin-bottom:8px">符文背包 ('+(player.runes.inventory||[]).length+')</div>';
  html+='<div style="flex:1;overflow-y:auto">';
  if(!player.runes.inventory||player.runes.inventory.length===0){
    html+='<div style="text-align:center;color:#BBB;font-size:13px;padding:20px">暂无符文，击败敌人有概率掉落</div>';
  }else{
    html+='<div class="panel-skill-grid" style="grid-template-columns:repeat(3,1fr)">';
    for(let i=0;i<player.runes.inventory.length;i++){
      const r=player.runes.inventory[i];
      const qColor=RUNE_QUALITY.indexOf(r.quality)>=0?['#AAA','#4CAF50','#9C27B0','#FF9800'][r.qualityIdx||0]:'#CCC';
      html+='<div class="panel-skill-item" style="border-left-color:'+qColor+'">';
      html+='<div class="skill-icon-row"><span class="skill-icon">'+r.icon+'</span><span class="skill-name">'+r.name+'</span><span class="skill-quality-tag" style="color:'+qColor+'">'+r.quality+'</span></div>';
      html+='<div class="skill-desc">'+r.desc+'</div>';
      html+='<div style="margin-top:4px;display:flex;gap:4px;flex-wrap:wrap">';
      for(const sl of slots){
        if(!sl.eq)continue;
        html+='<button style="background:#C9A96E;color:#FFF;border:none;border-radius:4px;padding:2px 8px;cursor:pointer;font-size:11px" onclick="equipRune('+i+',\''+sl.key+'\')">'+sl.label+'</button>';
      }
      html+='<button style="background:#E74C3C;color:#FFF;border:none;border-radius:4px;padding:2px 8px;cursor:pointer;font-size:11px" onclick="discardRune('+i+')">丢弃</button>';
      html+='</div></div>';
    }
    html+='</div>';
  }
  html+='</div>';

  panel.innerHTML=html;
  panel.style.overflowY='auto';
}

function equipRune(invIdx,slotKey){
  if(!player.runes)player.runes={weapon:[],armor:[],accessory:[],inventory:[]};
  if(!player.runes.inventory||invIdx>=player.runes.inventory.length)return;
  if(!player.equipment[slotKey]){addLog('未装备对应栏位装备','log-info');return}
  if(!player.runes[slotKey])player.runes[slotKey]=[];
  // Find empty slot
  const slotRunes=player.runes[slotKey];
  if(slotRunes.length>=2&&slotRunes[0]&&slotRunes[1]){addLog('该栏位符文已满（2个）','log-info');return}
  const rune=player.runes.inventory.splice(invIdx,1)[0];
  if(slotRunes.length===0){slotRunes[0]=rune;slotRunes[1]=undefined;}
  else if(!slotRunes[0]){slotRunes[0]=rune;}
  else if(!slotRunes[1]){slotRunes[1]=rune;}
  else{slotRunes.push(rune);}
  addLog('符文 '+rune.name+' 已铭刻至装备','log-info');
  renderRunePanel();saveGame();
}

function unequipRune(slotKey,idx){
  if(!player.runes||!player.runes[slotKey]||!player.runes[slotKey][idx])return;
  if(!player.runes.inventory)player.runes.inventory=[];
  player.runes.inventory.push(player.runes[slotKey][idx]);
  player.runes[slotKey][idx]=undefined;
  // Compact
  player.runes[slotKey]=player.runes[slotKey].filter(Boolean);
  renderRunePanel();saveGame();
}

function discardRune(invIdx){
  if(!confirm('确认丢弃这个符文吗？'))return;
  player.runes.inventory.splice(invIdx,1);
  renderRunePanel();saveGame();
}

// Rune effects in combat
function getRuneEffect(effectType){
  if(!player.runes)return 0;
  let total=0;
  for(const sk of ['weapon','armor','accessory']){
    const runes=player.runes[sk]||[];
    for(const r of runes){if(r&&r.type===effectType)total+=r.value;}
  }
  return total/100; // Return as decimal
}

    html+='<div style="display:flex;gap:10px;flex:1;overflow-y:auto">';

      const locked=player.realmIndex<s.reqRealm;
      html+='<div style="flex:1;background:#FAFAFA;border:2px solid '+s.color+';border-radius:12px;padding:14px;text-align:center'+(locked?';opacity:0.5':'')+'">';

      }else{
        html+='<button style="margin-top:8px;padding:5px 20px;background:'+s.color+';color:#FFF;border:none;border-radius:6px;cursor:pointer;font-size:13px" onclick="joinSect(\''+s.id+'\')">加入</button>';
      }
      html+='</div>';
    }
    html+='</div>';
  }else{
    const sect=SECTS.find(s=>s.id===player.sect.id);
    if(!sect){player.sect.id=null;renderSectPanel();return}

    html+='<div style="background:'+sect.color+'10;border:2px solid '+sect.color+';border-radius:12px;padding:14px;margin-bottom:12px;text-align:center">';
    html+='<div style="font-size:32px">'+sect.icon+'</div>';
    html+='<div style="font-size:18px;font-weight:700;color:#333">'+sect.name+'</div>';
    html+='<div style="font-size:12px;color:#999">等级 '+player.sect.level+' | 贡献 '+player.sect.contributions+'</div>';
    html+='<div style="font-size:11px;color:'+sect.color+'">加成: 攻击+'+(sect.passive.atkMul*100)+'%</div>';
    html+='</div>';

    // Daily tasks
    const today=new Date().toDateString();
    if(player.sect.dailyReset!==today){player.sect.dailyTasks={};player.sect.dailyReset=today;}
    let totalContribute=0;
    html+='<div style="font-size:14px;font-weight:700;color:#C9A96E;margin-bottom:8px">每日任务</div>';
    for(const t of SECT_DAILY_TASKS){
      const progress=player.sect.dailyTasks[t.id]||0;
      const done=progress>=t.target;
      html+='<div style="display:flex;align-items:center;padding:6px 0;border-bottom:1px solid #F0F0F0;font-size:12px">';
      html+='<span style="flex:1">'+t.desc+'</span>';
      html+='<span style="margin:0 8px;color:'+(done?'#4CAF50':'#999')+'">'+progress+'/'+t.target+'</span>';
      html+='<span style="color:#C9A96E">+'+t.reward+'贡献</span>';
      if(done){
        html+='<span style="margin-left:6px;color:#4CAF50">✅</span>';
        totalContribute+=t.reward;
      }
      html+='</div>';
    }

    // Sect shop
    html+='<div style="font-size:14px;font-weight:700;color:#C9A96E;margin:12px 0 8px">宗门商店</div>';
    html+='<div style="display:flex;gap:8px;flex-wrap:wrap">';
    for(const item of SECT_SHOP){
      const canBuy=player.sect.contributions>=item.cost;
      html+='<div style="flex:1;min-width:130px;background:#FAFAFA;border-radius:8px;padding:8px;text-align:center;font-size:11px">';

      html+='</div>';
    }
    html+='</div>';
  }

  panel.innerHTML=html;
  panel.style.overflowY='auto';
}

function joinSect(sectId){
  if(player.sect.id){addLog('已有宗门，请先退出','log-info');return}
  const s=SECTS.find(x=>x.id===sectId);
  if(!s)return;
  player.sect={id:sectId,contribute:0,level:1,contributions:0,dailyTasks:{},dailyReset:new Date().toDateString()};
  addLog('加入'+s.name+'！','log-victory');
  renderSectPanel();saveGame();
}

function buySectItem(itemId){
  const item=SECT_SHOP.find(x=>x.id===itemId);
  if(!item||player.sect.contributions<item.cost){addLog('贡献不足','log-info');return}
  player.sect.contributions-=item.cost;
  switch(itemId){
    case 'sc1': player.lingshi+=200+Math.floor(Math.random()*400);addLog('获得灵石','log-victory');break;
    case 'sc2': player.skillPoints=(player.skillPoints||0)+2;addLog('技能点+2','log-victory');break;
    case 'sc3': recruitPartner('premium');addLog('高级招募x1','log-victory');break;
    case 'sc4': if(!player.enchantMaterials)player.enchantMaterials={};player.enchantMaterials.spiritStone=(player.enchantMaterials.spiritStone||0)+3;addLog('强化石x3','log-victory');break;
    case 'sc5': if(!player.enchantMaterials)player.enchantMaterials={};player.enchantMaterials.beastFood=(player.enchantMaterials.beastFood||0)+5;addLog('灵兽口粮x5','log-victory');break;
    case 'sc6': player.rebirthStones=(player.rebirthStones||0)+1;addLog('转生石+1','log-victory');break;
  }
  renderSectPanel();saveGame();
}

// Called by daily progress tracking
function trackSectProgress(type,amount){
  if(!player.sect||!player.sect.id)return;
  const today=new Date().toDateString();
  if(player.sect.dailyReset!==today){player.sect.dailyTasks={};player.sect.dailyReset=today;}
  const tasks=SECT_DAILY_TASKS.filter(t=>t.type===type);
  for(const t of tasks){
    const old=player.sect.dailyTasks[t.id]||0;
    if(old>=t.target)continue;
    player.sect.dailyTasks[t.id]=Math.min(t.target,old+(amount||1));
    if(player.sect.dailyTasks[t.id]>=t.target&&old<t.target){
      player.sect.contributions+=t.reward;
      addLog('宗门每日: '+t.desc+' 完成！贡献+'+t.reward,'log-victory');
    }
  }
}


// ==================== BESTIARY PANEL ====================
function renderBestiaryPanel(){
  const panel=document.getElementById('centerPanel');
  if(!panel||panel.style.display==='none')return;
  if(!player.bestiary)player.bestiary={kills:{},bonuses:[]};

  // Group enemies by realm
  const realmGroups={};
  for(const e of ENEMIES){
    const rk=e.realmMin;
    if(!realmGroups[rk])realmGroups[rk]={realm:REALMS[rk]?REALMS[rk].name:'境界'+rk,enemies:[],killed:0,total:0};
    const killed=player.bestiary.kills[e.id]||0;
    realmGroups[rk].enemies.push({...e,killed:killed});
    realmGroups[rk].total++;
    if(killed>=1)realmGroups[rk].killed++;
  }
  // Bosses
  const bossGroup={realm:'隐藏Boss',enemies:[],killed:0,total:0};
  for(const b of HIDDEN_BOSSES){
    const killed=player.bestiary.kills[b.id]||0;
    bossGroup.enemies.push({...b,killed:killed});
    bossGroup.total++;
    if(killed>=1)bossGroup.killed++;
  }
  realmGroups['boss']=bossGroup;

  let html='<div class="card-title">敌人图鉴</div>';

  // Overall progress
  let totalKilled=0,totalEnemies=0;
  for(const g of Object.values(realmGroups)){totalKilled+=g.killed;totalEnemies+=g.total;}
  const overallPct=totalEnemies>0?Math.floor(totalKilled/totalEnemies*100):0;
  html+='<div style="background:#FFFDF5;border-radius:10px;padding:12px;margin-bottom:12px;text-align:center">';
  html+='<div style="font-size:24px;font-weight:700;color:#C9A96E">'+overallPct+'%</div>';
  html+='<div style="font-size:12px;color:#999">图鉴收集 '+totalKilled+'/'+totalEnemies+'</div>';
  html+='<div style="height:6px;background:#E8E8E8;border-radius:3px;margin:8px auto 0;max-width:300px;overflow:hidden">';
  html+='<div style="height:100%;width:'+overallPct+'%;background:linear-gradient(90deg,#C9A96E,#FF9800);border-radius:3px"></div></div>';

  // Milestone bonuses
  const milestones=[25,50,75,100];
  html+='<div style="display:flex;gap:6px;justify-content:center;margin-top:8px;font-size:10px">';
  for(const m of milestones){
    const reached=overallPct>=m;

    html+='<div style="margin-bottom:10px">';

    html+='<div style="display:flex;gap:4px;flex-wrap:wrap">';

      html+='</div>';
    }
    html+='</div></div>';
  }
  html+='</div>';

  panel.innerHTML=html;
  panel.style.overflowY='auto';
}

function doFish(){
  if(!player.fishing)player.fishing={rod:0,caught:{},lastFish:0};
  const now=Date.now();
  if(now-player.fishing.lastFish<3000)return;
  player.fishing.lastFish=now;

  const rod=FISHING_RODS[player.fishing.rod]||FISHING_RODS[0];
  const available=FISH_TYPES.filter(f=>f.minCatch<=rod.power);
  // Weighted random
  const totalWeight=available.reduce((s,f)=>s+f.weight,0);
  let roll=Math.random()*totalWeight;
  let caught=available[0];
  for(const f of available){roll-=f.weight;if(roll<=0){caught=f;break}}

  player.fishing.caught[caught.id]=(player.fishing.caught[caught.id]||0)+1;

  // Reward
  switch(caught.id){
    case 'carp': player.caveResources.herbs+=5+Math.floor(Math.random()*11);addLog('🎣 钓到'+caught.name+'！药材+'+Math.floor(player.caveResources.herbs),'log-info');break;
    case 'lotus': {const rw=30+Math.floor(Math.random()*51);player.lingshi+=rw;addLog('🎣 钓到'+caught.name+'！灵石+'+rw,'log-victory');}break;
    case 'dragon': player.skillPoints=(player.skillPoints||0)+1;addLog('🎣 钓到'+caught.name+'！技能点+1','log-victory');break;
    case 'phoenix': {if(!player.runes)player.runes={weapon:[],armor:[],accessory:[],inventory:[]};player.runes.inventory.push(generateRune());addLog('🎣 钓到'+caught.name+'！获得符文','log-victory');}break;
    case 'gold': {const pill=DAN_RECIPES.find(r=>r.effect==='atk'||r.effect==='crit');if(pill){craftPill(pill.id);addLog('🎣 钓到'+caught.name+'！自动炼制'+pill.name,'log-victory');}}break;
  }

  renderFishingPanel();
  saveGame();
}

function upgradeRod(){
  if(!player.fishing)player.fishing={rod:0,caught:{},lastFish:0};
  if(player.fishing.rod>=FISHING_RODS.length-1){addLog('鱼竿已满级','log-info');return}
  const next=FISHING_RODS[player.fishing.rod+1];
  if(player.lingshi<next.cost){addLog('灵石不足','log-info');return}
  player.lingshi-=next.cost;
  player.fishing.rod++;
  addLog('鱼竿升级：'+next.name+'！','log-victory');
  renderFishingPanel();
  saveGame();
}

function towerFight(){
  if(!player.tower)player.tower={floor:1,maxFloor:1,dailyReward:0};
  if(gameState.inCombat){addLog('战斗已在进行中！','log-info');return}
  const cfg=TOWER_FLOORS[player.tower.floor-1];
  if(!cfg){addLog('已通关全部楼层！','log-victory');return}

  const tier=cfg.tier;
  const eBase=ENEMIES.find(e=>e.realmMin>=tier*5&&e.realmMin<=(tier+1)*5)||ENEMIES[ENEMIES.length-1];
  const scale=1+player.tower.floor*0.3;
  combatMode='tower';
  towerEnemyData={id:'tower_floor'+player.tower.floor,name:cfg.name,hp:Math.floor(eBase.hp*scale),atk:Math.floor(eBase.atk*(1+player.tower.floor*0.2)),def:Math.floor(eBase.def*(1+player.tower.floor*0.15)),dropQi:Math.floor(eBase.dropQi*scale),dropExp:Math.floor(eBase.dropExp*(1+player.tower.floor*0.5)),critRate:eBase.critRate,dodgeRate:eBase.dodgeRate,tier:tier,icon:cfg.icon,realmMin:0,isBoss:false};

  closePanel();
  const enemies=generateEnemies();
  combatData.enemies=enemies;
  const alive=enemies.filter(e=>e!==null);
  combatData.currentTarget=alive[0]?enemies.indexOf(alive[0]):1;
  combatData.playerHp=maxHp();
  combatData.logCount=0;
  combatData.playerLastAttack=Date.now();
  combatData.partnerLastAttack={};
  combatData.partnerHps={};

  const activePartners=getActivePartners();
  for(const p of activePartners){
    combatData.partnerHps[p.id]=p.baseHp;
    combatData.partnerLastAttack[p.id]=Date.now();
  }
  for(const e of enemies){
    if(e!==null){
      e.lastAttack=Date.now();
      e.attackInterval=3.0+Math.random()*2.0;
    }
  }

  addLog('——————————————','log-info');
  addLog('🗼 爬塔·'+cfg.name+' 第'+player.tower.floor+'层！','log-info');
  addLog('——————————————','log-info');

  updateEnemyUI();
  gameState.inCombat=true;
  player.skillCooldowns={};player.defBuff=0;
  for(const p of activePartners){p.skillCooldowns={};}
  document.getElementById('btnFight').textContent='爬塔中...';
  document.getElementById('btnFight').style.opacity='0.6';
  combatData.tickIntervalId=setInterval(combatTick,100);
}

function claimTowerReward(checkpoint){
  if(!player.tower)player.tower={floor:1,maxFloor:1,dailyReward:0};
  if(player.tower.floor<checkpoint||player.tower.maxFloor<checkpoint)return;
  if((player.tower.dailyReward||0)>=checkpoint){addLog('今日已领取该档奖励','log-info');return}
  player.tower.dailyReward=checkpoint;

  if(!player.permaPillStats)player.permaPillStats={maxHp:0,maxQi:0,atk:0,def:0,crit:0};if(!player.runes)player.runes={weapon:[],armor:[],accessory:[],inventory:[]};if(!player.equippedRunes)player.equippedRunes=[{},{},{}];if(!player.sect)player.sect=null;if(!player.sectTasks)player.sectTasks=[];if(!player.sectTaskProgress)player.sectTaskProgress={};if(!player.sectShopInventory)player.sectShopInventory=[];if(!player.bestiary)player.bestiary={kills:{},bonuses:[]};if(!player.fishing)player.fishing={rod:0,caught:{},lastFish:0};if(!player.tower)player.tower={floor:1,maxFloor:1,dailyReward:0};
  if(checkpoint===10){player.permaPillStats.atk=(player.permaPillStats.atk||0)+5;player.lingshi+=500;}
  if(checkpoint===25){player.permaPillStats.maxHp=(player.permaPillStats.maxHp||0)+200;player.lingshi+=2000;}
  if(checkpoint===50){player.permaPillStats.def=(player.permaPillStats.def||0)+10;player.caveCapacity+=5;}
  if(checkpoint===100){player.permaPillStats.crit=(player.permaPillStats.crit||0)+5;player.skillPoints=(player.skillPoints||0)+3;}

  addLog('领取爬塔'+checkpoint+'层奖励！','log-victory');
  renderTowerPanel();
  saveGame();
}

  {id:'ae9',type:'neutral',name:'神秘商人',icon:'🎭',desc:'一个蒙面商人拦住了你，声称有好东西出售。',
    choices:[
      {text:'看看货（随机打折商品）',effect:function(){
        const items=[{name:'强化石',icon:'💎',cost:200,desc:'装备强化材料'},
                     {name:'灵兽口粮',icon:'🍖',cost:150,desc:'灵兽食物'},
                     {name:'技能书残页',icon:'📜',cost:300,desc:'随机获得1技能点'}];
        const item=items[Math.floor(Math.random()*items.length)];
        addLog('神秘商人展示了'+item.name+'，售价'+item.cost+'灵石。','log-info');
        if(player.lingshi>=item.cost){player.lingshi-=item.cost;addLog('你买下了'+item.name+'！','log-victory');
          if(item.name==='强化石'){if(!player.enchantMaterials)player.enchantMaterials={};player.enchantMaterials.stone=(player.enchantMaterials.stone||0)+1;}
          else if(item.name==='技能书残页')player.skillPoints=(player.skillPoints||0)+1;
        }else{addLog('灵石不够，商人失望离去。','log-info');}
      }},
      {text:'不感兴趣',effect:function(){addLog('商人耸耸肩，消失在人群中。','log-info');}},
    ]},
  {id:'ae10',type:'neutral',name:'茶摊歇脚',icon:'🍵',desc:'路边有个简陋的茶摊，茶香四溢。',
    choices:[
      {text:'喝杯灵茶（小概率获得增益Buff）',effect:function(){player.lingshi-=20;if(Math.random()<0.4){player.exp+=100;addLog('灵茶入腹，你感到一阵清明！经验+100','log-victory');}else{addLog('普通的茶，没什么特别。','log-info');}}},
      {text:'不喝，继续赶路',effect:function(){addLog('你匆匆走过茶摊。','log-info');}},
    ]},
];

function generateBanditEnemy(){
  const tier=Math.max(0,player.realmIndex-Math.floor(Math.random()*3));
  const pool=ENEMIES.filter(e=>e.realmMin<=tier&&e.realmMin>=tier-2);
  const base=pool.length>0?pool[Math.floor(Math.random()*pool.length)]:ENEMIES[0];
  return {id:'bandit_'+Date.now(),name:'劫匪',hp:Math.floor(base.hp*0.8),atk:Math.floor(base.atk*0.8),def:Math.floor(base.def*0.8),dropQi:base.dropQi,dropExp:base.dropExp,critRate:base.critRate,dodgeRate:base.dodgeRate,realmMin:base.realmMin,isBoss:false,icon:'🗡'};
}

function triggerAdventureEvent(){
  if(gameState.inCombat)return;
  const events=ADVENTURE_EVENTS.filter(e=>{
    // Filter by realm if needed
    return true;
  });
  if(events.length===0)return;
  const ev=events[Math.floor(Math.random()*events.length)];
  showAdventureDialog(ev);
}

function showAdventureDialog(event){
  let html='<div style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);z-index:9999;display:flex;align-items:center;justify-content:center" id="adventureDialog">';
  html+='<div style="background:#FFFDF5;border-radius:16px;padding:24px;max-width:420px;width:90%;box-shadow:0 8px 32px rgba(0,0,0,0.3);border:2px solid #C9A96E">';
  html+='<div style="text-align:center;font-size:48px;margin-bottom:8px">'+event.icon+'</div>';
  html+='<div style="text-align:center;font-size:18px;font-weight:700;color:#C9A96E;margin-bottom:4px">'+event.name+'</div>';
  html+='<div style="text-align:center;font-size:13px;color:#666;margin-bottom:16px;line-height:1.6">'+event.desc+'</div>';
  for(let i=0;i<event.choices.length;i++){
    const ch=event.choices[i];
    html+='<div style="padding:10px 16px;margin-bottom:8px;background:#F5F0E8;border-radius:10px;cursor:pointer;font-size:13px;color:#5D4037;border:1px solid #E0D5C0" onclick="resolveAdventure(\''+event.id+'\','+i+')">'+ch.text+'</div>';
  }
  html+='</div></div>';
  document.body.insertAdjacentHTML('beforeend',html);
}

function resolveAdventure(eventId,choiceIdx){
  const event=ADVENTURE_EVENTS.find(e=>e.id===eventId);
  if(!event)return;
  const choice=event.choices[choiceIdx];
  if(!choice)return;

  // Close dialog
  const dlg=document.getElementById('adventureDialog');
  if(dlg)dlg.remove();

  // Execute effect
  choice.effect();
  updateAllUI();
  saveGame();
}

let adventureCooldown=0;
function checkAdventureTrigger(){
  if(gameState.inCombat)return;
  if(adventureCooldown>0){adventureCooldown--;return;}
  // Base 3% chance per tick, modified by fortune
  const chance=0.03+player.fortune*0.01;
  if(Math.random()<chance){
    triggerAdventureEvent();
    adventureCooldown=30; // cooldown ~3 seconds at 100ms tick
  }
}

// ==================== TREASURE MAP ====================
const TREASURE_MAP_TYPES = [
  {id:'tm_common',name:'凡品藏宝图',quality:'凡品',icon:'🗺',fragments:3,rewards:[
    {desc:'灵石200~500',effect:function(){return 200+Math.floor(Math.random()*300);},type:'lingshi'},
    {desc:'强化石x1~3',effect:function(){return 1+Math.floor(Math.random()*3);},type:'stone'},
    {desc:'药材+10~20',effect:function(){return 10+Math.floor(Math.random()*10);},type:'herb'},
  ],dropRate:0.4},
  {id:'tm_rare',name:'灵品藏宝图',quality:'灵品',icon:'🗺',fragments:5,rewards:[
    {desc:'灵石1000~3000',effect:function(){return 1000+Math.floor(Math.random()*2000);},type:'lingshi'},
    {desc:'随机凡品装备',effect:function(){return 'equip_common';},type:'equip'},
    {desc:'灵兽口粮x3~8',effect:function(){return 3+Math.floor(Math.random()*6);},type:'beastFood'},
    {desc:'随机符文(灵品)',effect:function(){return 'rune_rare';},type:'rune'},
  ],dropRate:0.3},
  {id:'tm_epic',name:'地品藏宝图',quality:'地品',icon:'🗺',fragments:8,rewards:[
    {desc:'灵石5000~15000',effect:function(){return 5000+Math.floor(Math.random()*10000);},type:'lingshi'},
    {desc:'随机地品装备',effect:function(){return 'equip_epic';},type:'equip'},
    {desc:'转生石x1',effect:function(){return 1;},type:'rebirthStone'},
    {desc:'随机符文(地品)',effect:function(){return 'rune_epic';},type:'rune'},
    {desc:'技能点+2',effect:function(){return 2;},type:'skillPoints'},
  ],dropRate:0.2},
  {id:'tm_legend',name:'天品藏宝图',quality:'天品',icon:'🗺',fragments:12,rewards:[
    {desc:'灵石20000~50000',effect:function(){return 20000+Math.floor(Math.random()*30000);},type:'lingshi'},
    {desc:'随机天品装备',effect:function(){return 'equip_legend';},type:'equip'},
    {desc:'转生石x3',effect:function(){return 3;},type:'rebirthStone'},
    {desc:'随机符文(天品)',effect:function(){return 'rune_legend';},type:'rune'},
    {desc:'技能点+5',effect:function(){return 5;},type:'skillPoints'},
    {desc:'随机灵兽',effect:function(){return 'beast_random';},type:'beast'},
  ],dropRate:0.1},
];

function generateTreasureFragment(){
  const roll=Math.random();
  let cumulative=0;
  for(const t of TREASURE_MAP_TYPES){
    cumulative+=t.dropRate;
    if(roll<cumulative)return t.id;
  }
  return 'tm_common'; // fallback
}

// Called when player gets a fragment
function addTreasureFragment(typeId){
  if(!player.treasureFragments)player.treasureFragments={};
  player.treasureFragments[typeId]=(player.treasureFragments[typeId]||0)+1;
  const t=TREASURE_MAP_TYPES.find(x=>x.id===typeId);
  const total=t?t.fragments:3;
  const cur=player.treasureFragments[typeId];
  addLog('🗺 获得'+ (t?t.name:'藏宝图')+'碎片！('+cur+'/'+total+')','log-victory');
  if(cur>=total){
    addLog('碎片集齐！可以在藏宝图面板合成完整的藏宝图！','log-victory');
  }
}

function canCraftMap(typeId){
  if(!player.treasureFragments)return false;
  const t=TREASURE_MAP_TYPES.find(x=>x.id===typeId);
  if(!t)return false;
  return (player.treasureFragments[typeId]||0)>=t.fragments;
}

function craftTreasureMap(typeId){
  if(!canCraftMap(typeId)){addLog('碎片不足！','log-info');return}
  const t=TREASURE_MAP_TYPES.find(x=>x.id===typeId);
  if(!t)return;
  player.treasureFragments[typeId]-=t.fragments;
  if(!player.treasureMaps)player.treasureMaps=[];
  player.treasureMaps.push({type:typeId,time:Date.now()});
  addLog('🗺 合成了一张'+t.name+'！','log-victory');
  renderTreasurePanel();
  saveGame();
}

function useTreasureMap(mapIndex){
  if(!player.treasureMaps||mapIndex>=player.treasureMaps.length)return;
  const map=player.treasureMaps[mapIndex];
  const t=TREASURE_MAP_TYPES.find(x=>x.id===map.type);
  if(!t)return;

  // Remove the map
  player.treasureMaps.splice(mapIndex,1);

  // Pick random reward
  const reward=t.rewards[Math.floor(Math.random()*t.rewards.length)];
  let rewardText='';

  if(reward.type==='lingshi'){
    const val=reward.effect();
    player.lingshi+=val;
    rewardText='灵石+'+val;
  }else if(reward.type==='stone'){
    const val=reward.effect();
    if(!player.enchantMaterials)player.enchantMaterials={};
    player.enchantMaterials.stone=(player.enchantMaterials.stone||0)+val;
    rewardText='强化石x'+val;
  }else if(reward.type==='herb'){
    const val=reward.effect();
    player.caveResources.herbs=(player.caveResources.herbs||0)+val;
    rewardText='药材+'+val;
  }else if(reward.type==='beastFood'){
    const val=reward.effect();
    player.beastFood=(player.beastFood||0)+val;
    rewardText='灵兽口粮x'+val;
  }else if(reward.type==='rebirthStone'){
    const val=reward.effect();
    player.rebirthStones=(player.rebirthStones||0)+val;
    rewardText='转生石x'+val;
  }else if(reward.type==='skillPoints'){
    const val=reward.effect();
    player.skillPoints=(player.skillPoints||0)+val;
    rewardText='技能点+'+val;
  }else if(reward.type==='rune'){
    const qMap={rune_rare:1,rune_epic:2,rune_legend:3};
    const targetQ=qMap[reward.effect()]||0;
    let rune;
    for(let attempt=0;attempt<20;attempt++){
      rune=generateRune();
      if(rune.qualityIdx>=targetQ)break;
    }
    player.runes.inventory.push(rune);
    rewardText=rune.name+'('+rune.quality+')';
  }else if(reward.type==='equip'){
    const qMap={equip_common:0,equip_epic:2,equip_legend:3};
    const targetQ=qMap[reward.effect()]||0;
    const pool=EQUIPMENT_POOL.filter(e=>e.qualityIdx>=targetQ);
    const pick=pool.length>0?pool[Math.floor(Math.random()*pool.length)]:EQUIPMENT_POOL[Math.floor(Math.random()*EQUIPMENT_POOL.length)];
    player.inventory.push({...pick,type:'equipment'});
    rewardText=pick.name+'('+pick.quality+')';
  }else if(reward.type==='beast'){
    const pool=BEASTS.filter(b=>!player.spiritBeasts.find(s=>s.id===b.id));
    if(pool.length>0){
      const pick=pool[Math.floor(Math.random()*pool.length)];
      player.spiritBeasts.push({id:pick.id,level:1,exp:0,evolution:0});
      rewardText='灵兽：'+pick.name;
    }else{
      player.lingshi+=5000;
      rewardText='已有全部灵兽，转换为灵石+5000';
    }
  }

  addLog('🗺 使用'+t.name+'，寻得宝藏：'+rewardText+'！','log-victory');
  renderTreasurePanel();
  updateAllUI();
  saveGame();
}

// ==================== TREASURE PANEL ====================
function renderTreasurePanel(){
  const panel=document.getElementById('centerPanel');
  if(!panel||panel.style.display==='none')return;
  if(!player.treasureFragments)player.treasureFragments={};
  if(!player.treasureMaps)player.treasureMaps=[];

  let html='<div class="card-title">藏宝图</div>';

  // Fragment collection
  html+='<div style="font-size:14px;font-weight:700;color:#C9A96E;margin-bottom:8px">碎片收集</div>';
  for(const t of TREASURE_MAP_TYPES){
    const cur=player.treasureFragments[t.id]||0;
    const total=t.fragments;
    const pct=Math.min(100,Math.floor(cur/total*100));
    const canCraft=cur>=total;
    html+='<div style="display:flex;align-items:center;gap:8px;padding:6px 10px;margin-bottom:4px;background:'+(canCraft?'#FFF8E1':'#FAFAFA')+';border-radius:8px;border:1px solid '+(canCraft?'#FFC107':'#E0E0E0')+'">';
    html+='<span style="font-size:24px">🗺</span>';
    html+='<div style="flex:1"><div style="font-size:12px;font-weight:600;color:#333">'+t.name+' ('+t.quality+')</div>';
    html+='<div style="font-size:10px;color:#999">碎片 '+cur+'/'+total+'</div>';
    html+='<div style="height:4px;background:#E0E0E0;border-radius:2px;margin-top:2px"><div style="height:100%;width:'+pct+'%;background:'+(canCraft?'#FFC107':'#BDBDBD')+';border-radius:2px"></div></div></div>';
    if(canCraft){
      html+='<button onclick="craftTreasureMap(\''+t.id+'\')" style="padding:4px 10px;background:#FFC107;border:none;border-radius:6px;cursor:pointer;font-size:11px;font-weight:600;color:#5D4037">合成</button>';
    }
    html+='</div>';
  }

  // Owned maps
  html+='<div style="font-size:14px;font-weight:700;color:#C9A96E;margin:12px 0 8px">已拥有的藏宝图 ('+player.treasureMaps.length+')</div>';
  if(player.treasureMaps.length===0){
    html+='<div style="text-align:center;padding:20px;color:#999;font-size:12px">暂无藏宝图，去打怪或探索获取碎片吧</div>';
  }else{
    for(let i=0;i<player.treasureMaps.length;i++){
      const m=player.treasureMaps[i];
      const t=TREASURE_MAP_TYPES.find(x=>x.id===m.type);
      html+='<div style="display:flex;align-items:center;gap:8px;padding:8px 12px;margin-bottom:4px;background:#FFFDF5;border-radius:8px;border:1px solid #E0D5C0">';
      html+='<span style="font-size:28px">🗺</span>';
      html+='<div style="flex:1"><div style="font-size:13px;font-weight:600;color:#333">'+(t?t.name:'未知藏宝图')+'</div><div style="font-size:10px;color:#999">'+(t?t.quality:'')+'</div></div>';
      html+='<button onclick="useTreasureMap('+i+')" style="padding:6px 14px;background:#4CAF50;color:#FFF;border:none;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600">寻宝</button>';
      html+='</div>';
    }
  }

  panel.innerHTML=html;
  panel.style.overflowY='auto';
}


function startCombatWithCustom(enemies){
  // Close any open dialog
  const dlg=document.getElementById('adventureDialog');
  if(dlg)dlg.remove();

  const formatted=enemies.map((e,i)=>({template:e,id:'advenemy_'+Date.now()+'_'+i,hate:0,alive:true}));
  combatData.enemies=formatted.slice(0,3);
  combatData.currentTarget=0;
  gameState.inCombat=true;
  document.getElementById('btnFight').textContent='战斗';
  document.getElementById('btnFight').style.opacity='1';
  document.getElementById('btnStop').style.display='inline-block';
  updateEnemyUI();
  combatData.tickIntervalId=setInterval(combatTick,100);
}

// ==================== INIT ====================
function init(){
  const loaded=loadGame();
  updateAllUI();

  if(loaded){
    calcOfflineGains();
    updateAllUI();
  }

  // Idle interval
  idleIntervalId=setInterval(()=>{
    idleTick();
    if(!gameState.inCombat)updateAllUI();
  },1000);

  // Auto-save every 30s
  setInterval(()=>{saveGame()},30000);

  // Save before unload
  window.addEventListener('beforeunload',()=>saveGame());

  // Initial save
  saveGame();
}

init();
</script>
